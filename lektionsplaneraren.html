// Pool key: groups lessons by year-level slot (stage + grade + subject).
function poolKeyFor({ stage, grade, subject }) {
  return [stage, grade, subject].join("|");
}

// Phase 3: shared bank cache (mirrors the Apps Script "Bank" sheet).
// Stored in localStorage so the app works offline / on cold start, then refreshed.
const BANK_CACHE_KEY = "lektionsplaneraren-bank-cache-v1";

function loadBankCache() {
  try {
    const raw = localStorage.getItem(BANK_CACHE_KEY);
    if (!raw) return { lessons: [], fetchedAt: 0 };
    const parsed = JSON.parse(raw);
    return parsed?.lessons ? parsed : { lessons: [], fetchedAt: 0 };
  } catch {
    return { lessons: [], fetchedAt: 0 };
  }
}

function saveBankCache(data) {
  try {
    localStorage.setItem(BANK_CACHE_KEY, JSON.stringify(data));
    window.dispatchEvent(new Event("lp-bank-change"));
  } catch (e) {
    console.error("Bank cache save failed", e);
  }
}

// Apps Script Web App helper. Single endpoint; we POST a typed payload.
async function postToAppsScript(url, payload) {
  if (!url) throw new Error("No Apps Script URL configured");
  // text/plain avoids CORS preflight; Apps Script accepts the raw body.
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error(`Apps Script HTTP ${res.status}`);
  try { return await res.json(); } catch { return { ok: true }; }
}

async function getFromAppsScript(url, params = {}) {
  if (!url) throw new Error("No Apps Script URL configured");
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(qs ? `${url}?${qs}` : url, { method: "GET" });
  if (!res.ok) throw new Error(`Apps Script HTTP ${res.status}`);
  return await res.json();
}

// The bank API. Reads from local cache (synchronous); writes go remote then refresh.
const bankAPI = {
  // ---- Read (synchronous, from cache) ----
  all() { return loadBankCache().lessons; },
  active() { return this.all().filter(l => l.status === "active"); },
  byId(id) { return this.all().find(l => l.lesson_id === id) || null; },
  getActivePool({ stage, grade, subject }) {
    return this.active().filter(l =>
      l.stage === stage && String(l.grade) === String(grade) && l.subject === subject
    );
  },
  // Group active by (stage, grade) → list of subjects with their lessons. For BankView.
  matrixForStage(stage) {
    const lessons = this.active().filter(l => l.stage === stage);
    const map = new Map(); // key: `${grade}|${subject}` → [lessons]
    for (const l of lessons) {
      const k = `${l.grade}|${l.subject}`;
      if (!map.has(k)) map.set(k, []);
      map.get(k).push(l);
    }
    return map;
  },
  cacheUpsert(lesson) {
    const cache = loadBankCache();
    const idx = cache.lessons.findIndex(l => l.lesson_id === lesson.lesson_id);
    if (idx >= 0) cache.lessons[idx] = lesson;
    else cache.lessons.push(lesson);
    saveBankCache(cache);
  },
  cacheMarkArchived(id) {
    const cache = loadBankCache();
    const rec = cache.lessons.find(l => l.lesson_id === id);
    if (rec) { rec.status = "archived"; rec.archived_at = new Date().toISOString(); }
    saveBankCache(cache);
  },
  // ---- Remote ----
  async refresh(url) {
    const r = await getFromAppsScript(url, { type: "bank" });
    if (r.ok && Array.isArray(r.lessons)) {
      saveBankCache({ lessons: r.lessons, fetchedAt: Date.now() });
      return r.lessons;
    }
    throw new Error(r.error || "bank fetch failed");
  },
  async addLesson(url, { schoolId, stage, grade, subject, topic, title, duration, lesson }) {
    const r = await postToAppsScript(url, {
      type: "newLesson",
      schoolId, stage, grade, subject, topic, title, duration, lesson,
    });
    if (!r.ok) {
      const err = new Error(r.error || "newLesson failed");
      err.code = r.error;
      err.activeCount = r.activeCount;
      throw err;
    }
    // Optimistic cache write (refresh will reconcile shortly).
    const lessonRec = {
      lesson_id: r.lessonId,
      created_at: new Date().toISOString(),
      created_by_school: schoolId,
      status: "active",
      stage, grade, subject, topic, title,
      duration,
      lesson,
      archived_at: "",
    };
    this.cacheUpsert(lessonRec);
    return lessonRec;
  },
  async archive(url, lessonId, schoolId) {
    await postToAppsScript(url, { type: "archiveLesson", lessonId, schoolId });
    this.cacheMarkArchived(lessonId);
  },
};

const schoolsAPI = {
  all() { return loadSchoolsCache(); },
  async refresh(url) {
    const r = await getFromAppsScript(url, { type: "schools" });
    if (r.ok && Array.isArray(r.schools)) {
      saveSchoolsCache(r.schools);
      return r.schools;
    }
    throw new Error(r.error || "schools fetch failed");
  },
  async create(url, name) {
    const r = await postToAppsScript(url, { type: "createSchool", name });
    if (!r.ok) throw new Error(r.error || "createSchool failed");
    // Optimistic cache update so the dropdown sees the new school immediately.
    const list = loadSchoolsCache();
    if (!list.some(s => s.school_id === r.schoolId)) {
      list.push({ school_id: r.schoolId, name: r.name, created_at: new Date().toISOString() });
      saveSchoolsCache(list);
    }
    return r;
  },
};

// Simple Levenshtein distance → similarity ratio in [0,1]. Used to flag near-duplicates
// when creating a new school. 1.0 = identical, 0 = nothing in common.
function similarityRatio(a, b) {
  const s1 = String(a || "").trim().toLowerCase();
  const s2 = String(b || "").trim().toLowerCase();
  if (!s1 && !s2) return 1;
  if (!s1 || !s2) return 0;
  const m = s1.length, n = s2.length;
  // Quick reject for very different lengths.
  if (Math.abs(m - n) / Math.max(m, n) > 0.5) {
    // still compute — some accents/spaces can change length a lot
  }
  // Levenshtein with rolling row to keep memory small.
  let prev = new Array(n + 1).fill(0);
  let curr = new Array(n + 1).fill(0);
  for (let j = 0; j <= n; j++) prev[j] = j;
  for (let i = 1; i <= m; i++) {
    curr[0] = i;
    for (let j = 1; j <= n; j++) {
      const cost = s1[i - 1] === s2[j - 1] ? 0 : 1;
      curr[j] = Math.min(curr[j - 1] + 1, prev[j] + 1, prev[j - 1] + cost);
    }
    [prev, curr] = [curr, prev];
  }
  const dist = prev[n];
  const maxLen = Math.max(m, n);
  return maxLen === 0 ? 1 : 1 - dist / maxLen;
}

const lessonLibrary = {
  // Per-school local store: usage log and feedback (keyed by remote lesson_id).
  // The bank itself lives remote; we don't duplicate it here.
  _load() {
    try {
      const raw = localStorage.getItem(LIBRARY_KEY);
      if (!raw) return { schema: 3, usage: [], feedback: [] };
      const parsed = JSON.parse(raw);
      if (parsed?.schema === 3) return parsed;
      // Migrate old schemas: drop them (they referred to local-only lessons).
      // Usage and feedback there used different keys, can't reliably link to new lesson_ids.
      // We don't want to lose them entirely though — keep raw blob in localStorage under backup key.
      try { localStorage.setItem(LIBRARY_KEY + "-backup", raw); } catch {}
      return { schema: 3, usage: [], feedback: [] };
    } catch {
      return { schema: 3, usage: [], feedback: [] };
    }
  },
  _save(data) {
    try {
      localStorage.setItem(LIBRARY_KEY, JSON.stringify(data));
      window.dispatchEvent(new Event("lp-library-change"));
    } catch (e) { console.error("Library save failed", e); }
  },
  addUsage({ lessonId, used }) {
    const data = this._load();
    data.usage.push({ lessonId, ...used, loggedAt: Date.now() });
    this._save(data);
  },
  addFeedback({ lessonId, feedback }) {
    const data = this._load();
    data.feedback.push({ lessonId, ...feedback, at: Date.now() });
    this._save(data);
  },
  getUsageForLesson(lessonId) {
    return this._load().usage.filter(u => u.lessonId === lessonId);
  },
  getFeedbackForLesson(lessonId) {
    return this._load().feedback.filter(f => f.lessonId === lessonId);
  },
  // For BankView "have I used this?" indicator.
  hasUsed(lessonId) {
    return this._load().usage.some(u => u.lessonId === lessonId);
  },
  allUsage() { return this._load().usage; },
  allFeedback() { return this._load().feedback; },
  exportAll() { return this._load(); },
  importAll(payload) {
    if (!payload || typeof payload !== "object") return false;
    if (payload.schema === 3) {
      this._save({ schema: 3, usage: payload.usage || [], feedback: payload.feedback || [] });
      return true;
    }
    return false;
  },
};

// ============================================================
// asLine — defensively coerce LLM-returned items (string OR object)
// into a renderable string. Prevents React error #31 when models
// return shapes like {studentSays, teacherResponse} instead of a
// plain string in arrays such as anticipatedResponses, teacherDoes,
// studentsDo, teacherScript, stod, utmaning, etc.
// ============================================================
function asLine(item) {
  if (item == null) return "";
  if (typeof item === "string") return item;
  if (typeof item === "number" || typeof item === "boolean") return String(item);
  if (typeof item === "object") {
    // Common shapes we've seen from the LLM
    if ("studentSays" in item && "teacherResponse" in item) {
      return `${item.studentSays} → ${item.teacherResponse}`;
    }
    if ("student" in item && "teacher" in item) {
      return `${item.student} → ${item.teacher}`;
    }
    if ("text" in item && typeof item.text === "string") return item.text;
    if ("description" in item && typeof item.description === "string") {
      return item.title ? `${item.title}: ${item.description}` : item.description;
    }
    if ("title" in item && typeof item.title === "string") return item.title;
    // Fallback: join all string-y values
    const strs = Object.values(item).filter(v => typeof v === "string");
    if (strs.length) return strs.join(" — ");
    try { return JSON.stringify(item); } catch { return "[object]"; }
  }
  return String(item);
}

// ============================================================
// API CALLERS
// ============================================================
function safeJsonParse(text) {
  const cleaned = text.replace(/```json|```/g, "").trim();
  try {
    return JSON.parse(cleaned);
  } catch (e) {
    // Fallback: try to repair truncated JSON by closing strings/braces/brackets
    let repaired = cleaned;
    // Remove trailing comma if any
    repaired = repaired.replace(/,\s*$/, "");
    // Count unbalanced quotes — if odd, the last string is unterminated
    let inString = false;
    let escape = false;
    let lastSafeIdx = 0;
    for (let i = 0; i < repaired.length; i++) {
      const c = repaired[i];
      if (escape) { escape = false; continue; }
      if (c === "\\") { escape = true; continue; }
      if (c === '"') { inString = !inString; if (!inString) lastSafeIdx = i + 1; }
      else if (!inString && (c === "}" || c === "]" || c === ",")) lastSafeIdx = i + 1;
    }
    repaired = repaired.slice(0, lastSafeIdx).replace(/,\s*$/, "");
    // Balance braces and brackets
    const opens = (repaired.match(/[{[]/g) || []).length;
    const closes = (repaired.match(/[}\]]/g) || []).length;
    const stack = [];
    for (const c of repaired) {
      if (c === "{") stack.push("}");
      else if (c === "[") stack.push("]");
      else if (c === "}" || c === "]") stack.pop();
    }
    while (stack.length) repaired += stack.pop();
    try {
      return JSON.parse(repaired);
    } catch (e2) {
      throw new Error(`Modellen returnerade ofullständig JSON. Försök igen, eller välj en annan modell. (${e.message})`);
    }
  }
}

async function callGemini({ apiKey, prompt, model }) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model || "gemini-2.5-flash"}:generateContent?key=${apiKey}`;
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 32768, responseMimeType: "application/json" },
    }),
  });
  if (!res.ok) throw new Error(`Gemini ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
  return safeJsonParse(text);
}

async function callAnthropic({ apiKey, prompt, model }) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: model || "claude-sonnet-4-5-20250929",
      max_tokens: 16384,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (!res.ok) throw new Error(`Anthropic ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const text = data.content.filter((b) => b.type === "text").map((b) => b.text).join("");
  return safeJsonParse(text);
}

async function callLocal({ baseUrl, apiKey, prompt, model }) {
  const url = `${baseUrl.replace(/\/$/, "")}/v1/chat/completions`;
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      ...(apiKey ? { Authorization: `Bearer ${apiKey}` } : {}),
    },
    body: JSON.stringify({
      model: model || "local-model",
      messages: [{ role: "user", content: prompt }],
      temperature: 0.8,
    }),
  });
  if (!res.ok) throw new Error(`Local ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const text = data?.choices?.[0]?.message?.content || "";
  return safeJsonParse(text);
}

// OpenAI and xAI both expose OpenAI-compatible /v1/chat/completions endpoints.
// We instruct the model to return JSON and ask for response_format json_object
// where supported (OpenAI), which xAI accepts and ignores cleanly.
async function callOpenAICompatible({ baseUrl, apiKey, prompt, model, providerLabel }) {
  const url = `${baseUrl}/v1/chat/completions`;
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${apiKey}`,
    },
    body: JSON.stringify({
      model,
      messages: [
        { role: "system", content: "You return only valid JSON with no markdown formatting." },
        { role: "user", content: prompt },
      ],
      temperature: 0.8,
      response_format: { type: "json_object" },
    }),
  });
  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`${providerLabel} ${res.status}: ${errText}`);
  }
  const data = await res.json();
  const text = data?.choices?.[0]?.message?.content || "";
  return safeJsonParse(text);
}

async function callOpenAI({ apiKey, prompt, model }) {
  return callOpenAICompatible({
    baseUrl: "https://api.openai.com",
    apiKey, prompt,
    model: model || "gpt-5.5",
    providerLabel: "OpenAI",
  });
}

async function callGrok({ apiKey, prompt, model }) {
  return callOpenAICompatible({
    baseUrl: "https://api.x.ai",
    apiKey, prompt,
    model: model || "grok-4",
    providerLabel: "Grok",
  });
}

async function runLLM(config, prompt) {
  if (config.provider === "gemini") return callGemini({ apiKey: config.geminiKey, prompt, model: config.geminiModel });
  if (config.provider === "anthropic") return callAnthropic({ apiKey: config.anthropicKey, prompt, model: config.anthropicModel });
  if (config.provider === "openai") return callOpenAI({ apiKey: config.openaiKey, prompt, model: config.openaiModel });
  if (config.provider === "grok") return callGrok({ apiKey: config.grokKey, prompt, model: config.grokModel });
  if (config.provider === "local") return callLocal({ baseUrl: config.localUrl, apiKey: config.localKey, prompt, model: config.localModel });
  throw new Error("No provider configured");
}

5. INGEN VAGT SPRÅK. Aldrig "diskutera ämnet" — alltid "ställ frågan: '...'. Lyssna efter svar som nämner X, Y eller Z."
6. Roligt och engagerande (lek, station, tävling, kreativt projekt, quiz, samarbete) men pedagogiskt värdefullt.
7. Bara material som rimligen finns i klassrummet (papper, pennor, tavla, ev. surfplattor).
8. EXTRA-AKTIVITETER om tid blir över — minst 2 stycken, fullt utskrivna med tydliga instruktioner och facit. Vikarien ska aldrig stå tom.

🚫 ABSOLUT FÖRBJUDET — FANTOMREFERENSER 🚫
EXTRA viktigt för en vikarie utan ämneskunskap. Du får ALDRIG referera till något som inte finns konkret i planen.

- ❌ "Använd bilden ni jobbat med"

REGEL: Innan du skriver phases, lista alla föremål/innehåll som vikarien kommer att referera till. För VARJE sådant: antingen lägg in en "Förberedelse"-fas (med innehållet skrivet ordagrant), eller embedda innehållet i embeddedContent. Om vikarien inte kan utföra ett steg utan att förstå ämnet — då har du misslyckats.

// Translate an entire lesson plan JSON object from Swedish to English.
// Returns a translation prompt that asks the model to keep the SAME JSON shape
// but translate every string field to English. Curriculum references (LGR22) stay
// recognizable (e.g. "LGR22 connection" keeps the term LGR22).
function translateLessonPrompt({ lesson, targetLanguage }) {
  const target = targetLanguage === "en" ? "English" : "Swedish";
  return `You are a translator. Translate this lesson plan JSON from Swedish to ${target}.

CRITICAL RULES:
1. Output ONLY the translated JSON. No commentary, no markdown, no backticks.
2. Preserve the EXACT JSON structure — same keys, same nesting, same arrays.
3. Translate every string VALUE. Do NOT translate JSON keys.
4. Keep numbers, durations, and IDs unchanged.
5. For curriculum references (LGR22, Gy22, central content phrases), keep the proper noun "LGR22"/"Gy22" but translate the surrounding description.
6. Subject names: "Matematik" → "Mathematics", "Svenska" → "Swedish", "Engelska" → "English", "NO" → "Science", "SO" → "Social Studies", "Idrott" → "PE", "Bild" → "Visual Arts", "Musik" → "Music".
7. Phase names: "Inledning" → "Introduction", "Genomgång" → "Direct teaching", "Stödd övning" → "Guided practice", "Enskild övning" → "Independent practice", "Avslutning" → "Closing".
8. Keep teacher-script tone natural in ${target}. Don't translate word-for-word; translate meaning.
9. If a value is already in ${target}, leave it unchanged.

LESSON JSON TO TRANSLATE:
${JSON.stringify(lesson, null, 2)}`;
}

// ============================================================
// EXTRAS PROMPTS — each one is a focused, one-shot LLM call
// triggered when the user opens a tab. The base lesson context is
// passed in so the extra is grounded in the actual plan.
// ============================================================
function extrasContextBlock(lesson, language) {
  const isSv = language === "sv";
  const lines = [];
  lines.push(isSv ? "LEKTIONSKONTEXT:" : "LESSON CONTEXT:");
  lines.push(`- ${isSv ? "Titel" : "Title"}: ${lesson.title}`);
  if (lesson.learningGoal) lines.push(`- ${isSv ? "Lärandemål" : "Learning goal"}: ${lesson.learningGoal}`);
  if (lesson.summary) lines.push(`- ${isSv ? "Sammanfattning" : "Summary"}: ${lesson.summary}`);
  if (lesson.phases?.length) {
    lines.push(`- ${isSv ? "Faser" : "Phases"}: ${lesson.phases.map(p => `${p.name} (${p.minutes}min)`).join(" | ")}`);
  }
  return lines.join("\n");
}

function extrasPrompt({ kind, lesson, stage, grade, subject, topic, duration, language }) {
  const isSv = language === "sv";
  const isEn = !isSv;
  // Top-of-prompt language anchor. The extras prompts are Swedish-dominated
  // and without a strong leading instruction the model echoes Swedish output.
  const langPrefix = isEn
    ? `**LANGUAGE: English.** Every string value in the JSON response must be in natural English. The prompt below uses Swedish framing for technical reasons, but the OUTPUT IS ENGLISH.\n\n`
    : `**SPRÅK: Svenska.** Allt innehåll i JSON-svaret ska skrivas på svenska.\n\n`;
  const langInstr = isSv ? "Svara på svenska." : "REMINDER: respond in English.";
  const ctx = extrasContextBlock(lesson, language);
  const stageLabel = isEn ? localizeLabel(stage, "en") : stage;
  const gradeLabel = isEn ? localizeLabel(grade, "en") : grade;
  const subjectLabel = isEn ? localizeLabel(subject, "en") : subject;
  const meta = `${stageLabel} · ${isSv ? "Årskurs" : "Grade"} ${gradeLabel} · ${subjectLabel} · "${topic}" · ${duration} min`;
  const youngerLearner = (typeof grade === "number" && grade <= 6) || /^F-|^åk ?[1-6]/i.test(String(grade));

  const builders = {
    worksheet: () => `${langPrefix}Du genererar ett ARBETSBLAD för eleverna baserat på lektionen nedan.

    imageSearch: () => `${langPrefix}Du föreslår BILDSÖKNINGAR för varje fas av lektionen — kuraterade länkar till fria bildkällor.

  const builder = builders[kind];

function Button({ variant = "secondary", icon, children, onClick, disabled, type = "button", style = {} }) {
  const variants = {
    primary: { background: "var(--accent)", color: "#fff", border: "1px solid var(--accent)" },
    primaryHover: { background: "var(--accent-hover)" },
    secondary: { background: "var(--bg-surface)", color: "var(--text-primary)", border: "1px solid var(--border-default)" },
    secondaryHover: { background: "var(--bg-secondary)", borderColor: "var(--border-strong)" },
    yellow: { background: "#F5C518", color: "#1A1A1A", border: "1px solid #C9A013" },
    yellowHover: { background: "#E8B814" },
    ghost: { background: "transparent", color: "var(--text-secondary)", border: "1px solid transparent" },
    ghostHover: { background: "var(--bg-secondary)", color: "var(--text-primary)" },
    danger: { background: "var(--bg-surface)", color: "var(--danger-text)", border: "1px solid var(--border-default)" },
    dangerHover: { background: "var(--danger-bg)", borderColor: "var(--danger-text)" },
  };
  const [hover, setHover] = useState(false);
  const base = variants[variant] || variants.secondary;
  const hoverStyles = !disabled && hover ? variants[variant + "Hover"] || {} : {};
  return (
    <button type={type} onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        display: "inline-flex", alignItems: "center", gap: 6,
        padding: "8px 14px", fontSize: 13, fontWeight: 500,
        borderRadius: "var(--radius-md)", transition: "all 0.12s",

        ...base, ...hoverStyles, ...style,
      }}>
      {icon}
      {children}

}

function Field({ label, children, hint }) {

    <div>
      <label style={{ display: "block", fontSize: 12, fontWeight: 500, color: "var(--text-secondary)", marginBottom: 6 }}>{label}</label>
      {children}
      {hint && <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginTop: 4 }}>{hint}</div>}

// A small "?" icon that opens a popover with instructions and an
// external "Get key →" link to the provider's console.
function HelpTooltip({ title, steps, linkUrl, linkLabel }) {
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);
  // Close on outside click
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [open]);
  return (
    <span ref={wrapRef} style={{ position: "relative", display: "inline-flex", marginLeft: 6 }}>
      <button
        type="button"
        onClick={() => setOpen(o => !o)}
        aria-label="Help"
        style={{
          width: 16, height: 16, padding: 0,
          display: "inline-flex", alignItems: "center", justifyContent: "center",
          background: open ? "var(--accent)" : "var(--bg-secondary)",
          color: open ? "#fff" : "var(--text-secondary)",
          border: "1px solid var(--border-default)",
          borderRadius: "50%", fontSize: 11, fontWeight: 700, lineHeight: 1,
          cursor: "pointer",
        }}
      >?</button>
      {open && (
        <div style={{
          position: "absolute", top: "calc(100% + 6px)", left: 0,
          zIndex: 60, width: 320, padding: 12,
          background: "var(--bg-surface)",
          border: "1px solid var(--border-default)",
          borderRadius: "var(--radius-md)",
          boxShadow: "var(--shadow-md)",
          fontSize: 12, lineHeight: 1.5, color: "var(--text-primary)",
        }}>
          {title && <div style={{ fontWeight: 600, marginBottom: 6 }}>{title}</div>}
          <ol style={{ margin: 0, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 3 }}>
            {steps.map((s, i) => <li key={i}>{s}</li>)}
          </ol>
          {linkUrl && (
            <a href={linkUrl} target="_blank" rel="noopener noreferrer" style={{
              display: "inline-flex", alignItems: "center", gap: 5,
              marginTop: 10, padding: "5px 10px", fontSize: 12, fontWeight: 500,
              background: "var(--accent)", color: "#fff",
              borderRadius: "var(--radius-sm)", textDecoration: "none",
            }}>{linkLabel || "Get key"} →</a>
          )}
        </div>
      )}
    </span>
  );
}

// ============================================================
// SCHOOL PICKER — pick existing or create new, with fuzzy-match guard.
// ============================================================
function SchoolPickerModal({ onClose, onSelect, onCreate, t, currentSchoolId, requireSelection }) {
  useSchoolsVersion();
  const schools = schoolsAPI.all();
  const [mode, setMode] = useState("pick"); // 'pick' | 'create'
  const [newName, setNewName] = useState("");
  const [creating, setCreating] = useState(false);
  const [confirmAnyway, setConfirmAnyway] = useState(false);
  const [error, setError] = useState("");

  // Top 3 near-duplicate suggestions for the typed name.
  const suggestions = React.useMemo(() => {
    const q = newName.trim();
    if (!q) return [];
    return schools
      .map(s => ({ ...s, ratio: similarityRatio(q, s.name) }))
      .filter(s => s.ratio >= 0.85 && s.ratio < 1)
      .sort((a, b) => b.ratio - a.ratio)
      .slice(0, 3);
  }, [newName, schools]);

  const exactMatch = React.useMemo(() => {
    const q = newName.trim().toLowerCase();
    return schools.find(s => String(s.name || "").trim().toLowerCase() === q);
  }, [newName, schools]);

  async function handleCreate() {
    setError("");
    if (!newName.trim()) return;
    if (exactMatch) {
      onSelect(exactMatch);
      return;
    }
    if (suggestions.length > 0 && !confirmAnyway) {
      setConfirmAnyway(true);
      return;
    }
    setCreating(true);
    try {
      const res = await onCreate(newName.trim());
      onSelect({ school_id: res.schoolId, name: res.name });
    } catch (e) {
      setError(String(e.message || e));
    } finally {
      setCreating(false);
    }
  }

  return (
    <div onClick={requireSelection ? undefined : onClose} style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 150,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 16,
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: "var(--bg-surface)", borderRadius: "var(--radius-lg)",
        maxWidth: 480, width: "100%", padding: 22, maxHeight: "85vh", overflowY: "auto",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <h2 style={{ fontSize: 17, fontWeight: 600 }}>🏫 {t.schoolPickerTitle}</h2>
          {!requireSelection && (
            <button onClick={onClose} style={{ background: "transparent", border: "none", fontSize: 18, cursor: "pointer", color: "var(--text-tertiary)" }}>×</button>
          )}
        </div>
        <p style={{ fontSize: 12, color: "var(--text-secondary)", marginBottom: 14, lineHeight: 1.5 }}>
          {requireSelection ? t.schoolPickerWelcome : t.schoolPickerDesc}
        </p>

        {mode === "pick" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {schools.length === 0 ? (
              <div style={{ padding: 16, textAlign: "center", color: "var(--text-tertiary)", fontSize: 12, fontStyle: "italic", border: "1px dashed var(--border-default)", borderRadius: "var(--radius-md)" }}>
                {t.schoolNoneYet}
              </div>
            ) : (
              <Select value={currentSchoolId || ""} onChange={(e) => {
                const found = schools.find(s => s.school_id === e.target.value);
                if (found) onSelect(found);
              }}>
                <option value="">{t.schoolPickPrompt}</option>
                {schools.map(s => (
                  <option key={s.school_id} value={s.school_id}>{s.name}</option>
                ))}
              </Select>
            )}
            <div style={{ borderTop: "1px dashed var(--border-default)", paddingTop: 10 }}>
              <button onClick={() => { setMode("create"); setError(""); }} style={{
                width: "100%", padding: "9px 12px", fontSize: 13, fontWeight: 500,
                background: "var(--accent-bg)", color: "var(--accent)",
                border: "1px solid var(--accent-bg)", borderRadius: "var(--radius-md)", cursor: "pointer",
              }}>
                + {t.schoolCreateNew}
              </button>
            </div>
          </div>
        )}

        {mode === "create" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Field label={t.schoolNameLabel} hint={t.schoolNameHint}>
              <Input value={newName} onChange={(e) => { setNewName(e.target.value); setConfirmAnyway(false); }}
                placeholder="Bromma Skola" autoFocus />
            </Field>

            {exactMatch && (
              <div style={{ padding: "8px 12px", background: "var(--accent-bg)", color: "var(--accent)", borderRadius: "var(--radius-sm)", fontSize: 12 }}>
                ℹ {t.schoolAlreadyExists}: <strong>{exactMatch.name}</strong>
              </div>
            )}

            {!exactMatch && suggestions.length > 0 && (
              <div style={{ padding: "10px 12px", background: "var(--warning-bg, #fff8e1)", border: "1px solid var(--warning-border, #ffd54f)", borderRadius: "var(--radius-sm)" }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: "var(--warning-text, #946800)", marginBottom: 6 }}>
                  ⚠ {t.schoolMaybeDuplicate}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {suggestions.map(s => (
                    <button key={s.school_id} onClick={() => onSelect(s)} style={{
                      textAlign: "left", padding: "5px 8px", fontSize: 12,
                      background: "var(--bg-surface)", border: "1px solid var(--border-subtle)",
                      borderRadius: "var(--radius-sm)", cursor: "pointer", color: "var(--text-primary)",
                    }}>
                      ↗ {s.name} <span style={{ fontSize: 10, color: "var(--text-tertiary)" }}>({Math.round(s.ratio * 100)}% {t.schoolSimilar})</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {error && (
              <div style={{ padding: "8px 12px", background: "var(--warning-bg)", color: "var(--warning-text)", borderRadius: "var(--radius-sm)", fontSize: 12 }}>
                {error}
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
              <button onClick={() => { setMode("pick"); setNewName(""); setError(""); }} style={smallBtn}>← {t.back}</button>
              <button onClick={handleCreate} disabled={!newName.trim() || creating} style={{
                ...smallBtn,
                padding: "7px 14px",
                background: "var(--accent)", color: "#fff", borderColor: "var(--accent)",
                opacity: (!newName.trim() || creating) ? 0.5 : 1,
                cursor: (!newName.trim() || creating) ? "not-allowed" : "pointer",
              }}>
                {creating ? t.schoolCreating
                  : exactMatch ? t.schoolUseExisting
                  : (suggestions.length > 0 && !confirmAnyway) ? t.schoolConfirmCreate
                  : t.schoolCreateButton}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// BANK VIEW — Year × Subject matrix of active lessons in the shared bank.
// ============================================================
const smallBtn = {
  padding: "5px 10px", fontSize: 12,
  background: "transparent", color: "var(--text-secondary)",
  border: "1px solid var(--border-default)",
  borderRadius: "var(--radius-sm)", cursor: "pointer",
};

function BankView({ onClose, onOpen, onArchive, onRefresh, loading, error, t }) {
  useBankVersion();
  const lessons = bankAPI.active();

  // Group: stage → grade → subject → lessons[]
  const grouped = React.useMemo(() => {
    const tree = {};
    for (const l of lessons) {
      const s = l.stage || "—";
      const g = l.grade || "—";
      const sub = l.subject || "—";
      tree[s] = tree[s] || {};
      tree[s][g] = tree[s][g] || {};
      tree[s][g][sub] = tree[s][g][sub] || [];
      tree[s][g][sub].push(l);
    }
    return tree;
  }, [lessons.length, lessons.map(l => l.lesson_id).join(",")]);

  const [selectedLesson, setSelectedLesson] = useState(null);

  const stages = Object.keys(grouped);

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 100,
      display: "flex", alignItems: "flex-start", justifyContent: "center", padding: 16, overflowY: "auto",
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: "var(--bg-surface)", borderRadius: "var(--radius-lg)",
        maxWidth: 1000, width: "100%", maxHeight: "92vh", overflowY: "auto",
        padding: 24, position: "relative",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 10 }}>
          <div>
            <h2 style={{ fontSize: 18, fontWeight: 600 }}>📚 {t.bankTitle}</h2>
            <p style={{ fontSize: 12, color: "var(--text-secondary)", marginTop: 2 }}>{t.bankDesc}</p>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            {loading && <span style={{ fontSize: 11, color: "var(--text-tertiary)" }}>{t.bankLoading}</span>}
            <button onClick={onRefresh} style={smallBtn}>↻ {t.bankRefresh}</button>
            <button onClick={onClose} style={{ ...smallBtn, padding: "5px 9px" }}>✕</button>
          </div>
        </div>

        {error && (
          <div style={{ marginBottom: 12, padding: "8px 12px", background: "var(--warning-bg)", color: "var(--warning-text)", borderRadius: "var(--radius-sm)", fontSize: 12 }}>
            {t.bankError}: {error}
          </div>
        )}

        {stages.length === 0 ? (
          <div style={{ padding: 40, textAlign: "center", color: "var(--text-tertiary)", fontStyle: "italic" }}>
            {loading ? t.bankLoading : t.bankEmpty}
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
            {stages.map(stage => {
              const grades = Object.keys(grouped[stage]).sort();
              return (
                <div key={stage}>
                  <div style={{
                    fontSize: 12, fontWeight: 700, color: "var(--text-tertiary)",
                    textTransform: "uppercase", letterSpacing: "0.05em",
                    marginBottom: 8, paddingBottom: 4, borderBottom: "1px solid var(--border-subtle)",
                  }}>{stage}</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                    {grades.map(grade => {
                      const subjects = Object.keys(grouped[stage][grade]).sort();
                      return (
                        <div key={grade}>
                          <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text-primary)", marginBottom: 6 }}>
                            {grade}
                          </div>
                          <div style={{
                            display: "grid",
                            gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))",
                            gap: 8,
                          }}>
                            {subjects.map(subject => {
                              const slots = grouped[stage][grade][subject];
                              return (
                                <div key={subject} style={{
                                  border: "1px solid var(--border-subtle)",
                                  borderRadius: "var(--radius-md)",
                                  padding: "8px 10px",
                                  background: "var(--bg-surface)",
                                }}>
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                                    <div style={{ fontSize: 12, fontWeight: 600 }}>{subject}</div>
                                    <div style={{ fontSize: 10, fontWeight: 600, color: slots.length >= ACTIVE_POOL_LIMIT ? "var(--warning-text)" : "var(--text-tertiary)" }}>
                                      {slots.length}/{ACTIVE_POOL_LIMIT}
                                    </div>
                                  </div>
                                  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                                    {Array.from({ length: ACTIVE_POOL_LIMIT }).map((_, i) => {
                                      const slot = slots[i];
                                      if (!slot) {
                                        return (
                                          <div key={i} style={{
                                            fontSize: 11, color: "var(--text-tertiary)",
                                            padding: "5px 8px",
                                            border: "1px dashed var(--border-default)",
                                            borderRadius: "var(--radius-sm)",
                                            fontStyle: "italic",
                                          }}>{t.bankEmptySlot}</div>
                                        );
                                      }
                                      const used = lessonLibrary.hasUsed(slot.lesson_id);
                                      return (
                                        <button key={i} onClick={() => setSelectedLesson(slot)} style={{
                                          textAlign: "left",
                                          padding: "5px 8px", fontSize: 11,
                                          background: used ? "var(--bg-secondary)" : "var(--accent-bg)",
                                          color: used ? "var(--text-tertiary)" : "var(--accent)",
                                          border: "1px solid " + (used ? "var(--border-subtle)" : "var(--accent-bg)"),
                                          borderRadius: "var(--radius-sm)",
                                          cursor: "pointer", fontWeight: 500,
                                          overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                                        }} title={slot.lesson?.title || slot.topic}>
                                          {used ? "✓ " : ""}{slot.lesson?.title || slot.topic || "—"}
                                        </button>
                                      );
                                    })}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {selectedLesson && (
        <BankLessonDetail lesson={selectedLesson} t={t}
          alreadyUsed={lessonLibrary.hasUsed(selectedLesson.lesson_id)}
          onClose={() => setSelectedLesson(null)}
          onOpen={() => { onOpen(selectedLesson.lesson_id); setSelectedLesson(null); }}
          onArchive={() => { onArchive(selectedLesson.lesson_id); setSelectedLesson(null); }}
        />
      )}
    </div>
  );
}

function DetailAndExtrasControls({ detailLevel, setDetailLevel, extrasEnabled, setExtrasEnabled, t }) {

    { key: "worksheet",       label: t.extrasWorksheet,       desc: t.extrasWorksheetDesc,       icon: "file" },
    { key: "anchorChart",     label: t.extrasAnchorChart,     desc: t.extrasAnchorChartDesc,     icon: "layers" },
    { key: "flashcards",      label: t.extrasFlashcards,      desc: t.extrasFlashcardsDesc,      icon: "book" },
    { key: "discussionCards", label: t.extrasDiscussionCards, desc: t.extrasDiscussionCardsDesc, icon: "users" },
    { key: "diagram",         label: t.extrasDiagram,         desc: t.extrasDiagramDesc,         icon: "share" },
    { key: "badges",          label: t.extrasBadges,          desc: t.extrasBadgesDesc,          icon: "award" },
    { key: "imageSearch",     label: t.extrasImageSearch,     desc: t.extrasImageSearchDesc,     icon: "image" },
  ];
  return (
    <div>
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 8 }}>
          {t.detailLevel}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 8 }}>
          {detailOpts.map(o => {
            const active = detailLevel === o.key;
            return (
              <button key={o.key} onClick={() => setDetailLevel(o.key)} style={{
                textAlign: "left", padding: "10px 12px",
                background: active ? "var(--accent-bg)" : "var(--bg-surface)",
                color: active ? "var(--accent)" : "var(--text-primary)",
                border: `1px solid ${active ? "var(--accent)" : "var(--border-default)"}`,
                borderRadius: "var(--radius-md)", cursor: "pointer",
              }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>{o.label}</div>
                <div style={{ fontSize: 11, color: active ? "var(--accent)" : "var(--text-secondary)", lineHeight: 1.4 }}>{o.desc}</div>
              </button>
            );
          })}
        </div>
      </div>

      <div>
        <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
          {t.extrasLabel}
        </div>
        <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginBottom: 10, lineHeight: 1.5 }}>{t.extrasHint}</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 6 }}>
          {extrasList.map(e => {
            const on = !!extrasEnabled[e.key];
            return (
              <label key={e.key} style={{
                display: "flex", gap: 8, alignItems: "flex-start",
                padding: "8px 10px",
                background: on ? "var(--accent-bg)" : "var(--bg-surface)",
                border: `1px solid ${on ? "var(--accent)" : "var(--border-default)"}`,
                borderRadius: "var(--radius-md)", cursor: "pointer",
              }}>
                <input
                  type="checkbox" checked={on}
                  onChange={(ev) => setExtrasEnabled(s => ({ ...s, [e.key]: ev.target.checked }))}
                  style={{ marginTop: 2 }}
                />
                <span style={{ flex: 1, minWidth: 0 }}>
                  <span style={{ fontSize: 12, fontWeight: 600, display: "block", color: on ? "var(--accent)" : "var(--text-primary)" }}>{e.label}</span>
                  <span style={{ fontSize: 11, color: "var(--text-secondary)", lineHeight: 1.4 }}>{e.desc}</span>
                </span>
              </label>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// EXTRAS TAB RENDERERS
// One render component per kind. Each shows a "Generate" button
// when no content exists, a spinner while loading, an error if
// the call failed, and the rendered output otherwise.
// ============================================================
function ExtraTabFrame({ children, onGenerate, loading, hasContent, t, printable, printRef }) {
  return (
    <div>
      {hasContent && (
        <div className="no-print" style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginBottom: 10 }}>
          <Button variant="ghost" icon={<Icon name="refresh" size={13} />} onClick={onGenerate}>{t.extraRegenerate}</Button>
          {printable && <Button variant="ghost" icon={<Icon name="print" size={13} />} onClick={() => window.print()}>{t.print}</Button>}
        </div>
      )}
      {!hasContent && !loading && (
        <div style={{ padding: "32px 16px", textAlign: "center" }}>
          <Button variant="primary" icon={<Icon name="sparkles" size={14} />} onClick={onGenerate}>{t.extraGenerate}</Button>
        </div>
      )}
      {loading && (
        <div style={{ padding: "32px 16px", textAlign: "center", color: "var(--text-secondary)" }}>
          <Icon name="refresh" size={20} style={{ animation: "spin 0.8s linear infinite" }} />
          <div style={{ marginTop: 8, fontSize: 13 }}>{t.extraGenerating}</div>
        </div>
      )}
      {hasContent && <div ref={printRef}>{children}</div>}
    </div>
  );
}

function WorksheetTab({ data, loading, onGenerate, t }) {
  const [showAnswers, setShowAnswers] = useState(false);
  const has = data && !data._error;
  return (
    <ExtraTabFrame onGenerate={onGenerate} loading={loading} hasContent={has} t={t} printable>
      {data?._error && <ErrorBox msg={data._error} t={t} />}
      {has && (
        <div>
          <div className="no-print" style={{ marginBottom: 12, display: "flex", gap: 6 }}>
            <button onClick={() => setShowAnswers(false)} style={miniToggle(!showAnswers)}>{t.printWithoutAnswers}</button>
            <button onClick={() => setShowAnswers(true)} style={miniToggle(showAnswers)}>{t.printWithAnswers}</button>
          </div>
          <div style={{ background: "var(--bg-surface)", padding: 20, border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-md)" }}>
            <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>{data.title}</h2>
            {data.instructions && <p style={{ fontSize: 13, color: "var(--text-secondary)", marginBottom: 16, fontStyle: "italic" }}>{data.instructions}</p>}
            <ol style={{ listStyle: "decimal inside", padding: 0, display: "flex", flexDirection: "column", gap: 14 }}>

function DiagramTab({ data, loading, onGenerate, t }) {
  const has = data && !data._error;
  const ref = useRef(null);
  useEffect(() => {
    if (!has || !ref.current) return;
    // Lazy-load mermaid via CDN if not already loaded
    if (!window.mermaid) {
      const script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js";
      script.onload = () => {
        window.mermaid.initialize({ startOnLoad: false, theme: "default" });
        renderMermaid();
      };
      document.head.appendChild(script);
    } else {
      renderMermaid();
    }
    async function renderMermaid() {
      try {
        const { svg } = await window.mermaid.render(`mmd-${Date.now()}`, data.code);
        if (ref.current) ref.current.innerHTML = svg;
      } catch (e) {
        if (ref.current) ref.current.innerHTML = `<div style="color:var(--danger-text);padding:12px;background:var(--danger-bg);border-radius:6px;font-size:12px;">Mermaid error: ${e.message}</div>`;
      }
    }
  }, [data, has]);

  return (
    <ExtraTabFrame onGenerate={onGenerate} loading={loading} hasContent={has} t={t} printable>
      {data?._error && <ErrorBox msg={data._error} t={t} />}
      {has && (
        <div>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 4 }}>{data.title}</h3>
          {data.description && <p style={{ fontSize: 12, color: "var(--text-secondary)", marginBottom: 14 }}>{data.description}</p>}
          <div ref={ref} style={{ background: "var(--bg-surface)", padding: 16, border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-md)", overflow: "auto", textAlign: "center" }} />
          {data.useCase && <p style={{ marginTop: 8, fontSize: 11, color: "var(--text-tertiary)", fontStyle: "italic" }}>↳ {data.useCase}</p>}
        </div>
      )}
    </ExtraTabFrame>
  );
}

const miniToggle = (active) => ({

// ============================================================
// LESSON CARD WITH TABS — wraps the plan and the extras tabs
// ============================================================
function LessonCardWithTabs({ lesson, t, extrasEnabled, extrasCache, loadingExtras, onGenerateExtra, onForceRegenerate, activeTab, setActiveTab, onMarkUsed, onSubmitFeedback }) {
  const tabs = [
    { key: "plan",            label: t.tabPlan,            icon: "book",   alwaysShow: true },
    { key: "worksheet",       label: t.tabWorksheet,       icon: "file" },
    { key: "anchorChart",     label: t.tabAnchorChart,     icon: "layers" },
    { key: "flashcards",      label: t.tabFlashcards,      icon: "book" },
    { key: "discussionCards", label: t.tabDiscussionCards, icon: "users" },
    { key: "diagram",         label: t.tabDiagram,         icon: "share" },
    { key: "badges",          label: t.tabBadges,          icon: "award" },
    { key: "imageSearch",     label: t.tabImageSearch,     icon: "image" },
  ];
  // Only show tabs whose extra is enabled (or already has data) + the plan tab.
  const visibleTabs = tabs.filter(tab => {
    if (tab.alwaysShow) return true;
    if (extrasEnabled[tab.key]) return true;
    if (extrasCache[`${lesson.id}:${tab.key}`]) return true;
    return false;
  });

  // When tab becomes active, auto-generate the extra if it isn't cached yet.
  useEffect(() => {
    if (activeTab === "plan") return;
    const cacheKey = `${lesson.id}:${activeTab}`;
    if (extrasCache[cacheKey]) return;
    if (loadingExtras[cacheKey]) return;
    onGenerateExtra(activeTab);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeTab, lesson.id]);

  const cacheKey = `${lesson.id}:${activeTab}`;
  const data = extrasCache[cacheKey];
  const loading = !!loadingExtras[cacheKey];

  return (
    <div>
      {/* Tab bar */}
      <div className="no-print" style={{
        display: "flex", gap: 4, marginBottom: 12, paddingBottom: 8,
        borderBottom: "1px solid var(--border-subtle)",
        overflowX: "auto", flexWrap: "wrap",
      }}>
        {visibleTabs.map(tab => {
          const active = activeTab === tab.key;
          const hasData = tab.key === "plan" || !!extrasCache[`${lesson.id}:${tab.key}`];
          const isLoading = !!loadingExtras[`${lesson.id}:${tab.key}`];
          return (
            <button key={tab.key} onClick={() => setActiveTab(tab.key)} style={{
              display: "inline-flex", alignItems: "center", gap: 6,
              padding: "6px 12px", fontSize: 12, fontWeight: 600,
              background: active ? "var(--accent)" : "transparent",
              color: active ? "#fff" : "var(--text-secondary)",
              border: "1px solid " + (active ? "var(--accent)" : "var(--border-default)"),
              borderRadius: "var(--radius-sm)", cursor: "pointer", whiteSpace: "nowrap",
            }}>
              <Icon name={tab.icon} size={12} />
              {tab.label}
              {isLoading && <Icon name="refresh" size={10} style={{ animation: "spin 0.8s linear infinite", opacity: 0.7 }} />}
              {!isLoading && hasData && tab.key !== "plan" && <span style={{ width: 6, height: 6, borderRadius: "50%", background: active ? "#fff" : "var(--success-text)" }} />}
            </button>
          );
        })}
      </div>

      {/* Tab content */}
      {activeTab === "plan" && <LessonCard lesson={lesson} t={t} onMarkUsed={onMarkUsed} onSubmitFeedback={onSubmitFeedback} />}
      {activeTab === "worksheet" && <WorksheetTab data={data} loading={loading} onGenerate={() => onForceRegenerate("worksheet")} t={t} />}
      {activeTab === "anchorChart" && <AnchorChartTab data={data} loading={loading} onGenerate={() => onForceRegenerate("anchorChart")} t={t} />}
      {activeTab === "badges" && <BadgesTab data={data} loading={loading} onGenerate={() => onForceRegenerate("badges")} t={t} />}
      {activeTab === "flashcards" && <FlashcardsTab data={data} loading={loading} onGenerate={() => onForceRegenerate("flashcards")} t={t} />}
      {activeTab === "discussionCards" && <DiscussionCardsTab data={data} loading={loading} onGenerate={() => onForceRegenerate("discussionCards")} t={t} />}
      {activeTab === "diagram" && <DiagramTab data={data} loading={loading} onGenerate={() => onForceRegenerate("diagram")} t={t} />}
      {activeTab === "imageSearch" && <ImageSearchTab data={data} loading={loading} onGenerate={() => onForceRegenerate("imageSearch")} t={t} />}
    </div>
  );
}

// ============================================================
// LESSON CARD
// ============================================================
function LessonCard({ lesson, t, onPick, isOption, optionLabel, onMarkUsed, onSubmitFeedback }) {
  // For options (preview cards) we show a compact preview; for the accepted lesson we show everything.
  const compact = isOption;
  const accent = lesson.isSub ? "#E8C547" : "var(--accent)";
  const totalMin = lesson.phases ? lesson.phases.reduce((s, p) => s + (p.minutes || 0), 0) : null;
  const ctx = lesson.ctx || {};
  const hasCtx = ctx.teacher || ctx.className || ctx.day || ctx.time || ctx.room;
  // Read existing feedback from library for this lesson (rerenders when library changes via _libTick).
  const existingFeedback = React.useMemo(() => {
    if (!lesson.id) return [];
    return lessonLibrary.getFeedbackForLesson(lesson.id);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [lesson.id, lesson._libTick]);

  const [markedUsedFlash, setMarkedUsedFlash] = React.useState(false);
  const [marking, setMarking] = React.useState(false);
  const [feedbackOpen, setFeedbackOpen] = React.useState(false);
  const [fbSubName, setFbSubName] = React.useState("");
  const [fbText, setFbText] = React.useState("");
  const [fbState, setFbState] = React.useState({ sending: false, sent: false, synced: null });

  const handleMarkUsed = async () => {
    if (!onMarkUsed) return;
    setMarking(true);
    try {
      await onMarkUsed();
      setMarkedUsedFlash(true);
      setTimeout(() => setMarkedUsedFlash(false), 2200);
    } finally {
      setMarking(false);
    }
  };
  const handleSendFeedback = async () => {
    if (!onSubmitFeedback || !fbText.trim()) return;
    setFbState({ sending: true, sent: false, synced: null });
    try {
      const res = await onSubmitFeedback({ subName: fbSubName.trim(), text: fbText.trim() });
      setFbState({ sending: false, sent: true, synced: !!res?.synced });
      setFbText(""); setFbSubName("");
      setTimeout(() => setFbState(s => ({ ...s, sent: false })), 3000);
    } catch (e) {
      setFbState({ sending: false, sent: false, synced: false });
    }
  };

  return (
    <div style={{
      background: "var(--bg-surface)",
      border: `1px solid ${lesson.isSub ? "#E8C547" : "var(--border-subtle)"}`,
      borderLeft: `3px solid ${accent}`,
      borderRadius: "var(--radius-md)",
      padding: "18px 22px",
      position: "relative",
    }}>
      {/* HEADER */}
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, marginBottom: 12, flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>
            {isOption && optionLabel && (
              <span style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", background: "var(--accent-bg)", padding: "2px 8px", borderRadius: "var(--radius-sm)", letterSpacing: "0.05em" }}>
                {optionLabel}
              </span>
            )}
            {lesson.isSub && (
              <span style={{ fontSize: 11, fontWeight: 600, color: "var(--warning-text)", background: "var(--warning-bg)", padding: "2px 8px", borderRadius: "var(--radius-sm)", letterSpacing: "0.05em" }}>
                {t.substituteLesson}
              </span>
            )}
            <span style={{ fontSize: 11, fontWeight: 500, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em" }}>
              {lesson.approach}
            </span>
          </div>
          <h3 style={{ fontSize: 18, fontWeight: 600, color: "var(--text-primary)", marginBottom: 4, lineHeight: 1.3 }}>{lesson.title}</h3>
          <p style={{ fontSize: 13, color: "var(--text-secondary)", lineHeight: 1.5 }}>{lesson.summary}</p>
          {lesson.approachReason && (
            <p style={{ fontSize: 12, color: "var(--text-tertiary)", lineHeight: 1.5, marginTop: 4, fontStyle: "italic" }}>↳ {lesson.approachReason}</p>
          )}
        </div>
        {totalMin && (
          <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12, color: "var(--text-tertiary)", whiteSpace: "nowrap" }}>
            <Icon name="clock" size={12} />
            <span>{totalMin} min</span>
          </div>
        )}
      </div>

      {/* Phase 1: lesson-context strip (teacher/class/day/time/room) — only on accepted lesson */}
      {!isOption && hasCtx && (

          fontSize: 12, color: "var(--text-secondary)",

          {ctx.className && <span><strong style={{ color: "var(--text-tertiary)", fontWeight: 600 }}>{t.className}:</strong> {ctx.className}</span>}
          {ctx.day && <span><strong style={{ color: "var(--text-tertiary)", fontWeight: 600 }}>{t.day}:</strong> {ctx.day}</span>}
