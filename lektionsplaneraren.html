                        {phase.anticipatedResponses.map((s, j) => (
                          <li key={j} style={{ display: "flex", gap: 6 }}>
                            <span style={{ color: "#6B3E8E", flexShrink: 0 }}>·</span>
                            <span>{asLine(s)}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </Section>
        )}

        {/* Legacy fallback */}
        {!lesson.phases && lesson.activities && (
          <Section icon="layers" label={t.activities}>
            <ol style={{ fontSize: 13, lineHeight: 1.6, paddingLeft: 18 }}>
              {lesson.activities.map((a, i) => <li key={i} style={{ marginBottom: 4 }}>{asLine(a)}</li>)}
            </ol>
          </Section>
        )}

        {/* Check for understanding */}
        {lesson.checkForUnderstanding && lesson.checkForUnderstanding.length > 0 && (
          <Section icon="target" label={t.checkForUnderstanding}>
            <ol style={{ fontSize: 13, lineHeight: 1.6, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 4 }}>
              {lesson.checkForUnderstanding.map((q, i) => <li key={i}>{q}</li>)}
            </ol>
          </Section>
        )}

        {/* EMBEDDED CONTENT (sub lessons) */}
        {lesson.embeddedContent && (
          <Section icon="book" label={t.embeddedContent}>
            {lesson.embeddedContent.description && (
              <p style={{ fontSize: 12, color: "var(--text-secondary)", marginBottom: 10, fontStyle: "italic" }}>
                {lesson.embeddedContent.description}
              </p>
            )}

            {lesson.embeddedContent.questions && lesson.embeddedContent.questions.length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
                  {t.embeddedQuestions}
                </div>
                <ol style={{ fontSize: 13, lineHeight: 1.55, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 8 }}>
                  {lesson.embeddedContent.questions.map((q, i) => (
                    <li key={i}>
                      <div>{q.q}</div>
                      <div style={{ fontSize: 12, color: "var(--success-text)", marginTop: 2 }}>✓ {q.expectedAnswer}</div>
                      {q.ifStuck && <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginTop: 2, fontStyle: "italic" }}>↳ Om de fastnar: {q.ifStuck}</div>}
                    </li>
                  ))}
                </ol>
              </div>
            )}

            {lesson.embeddedContent.problems && lesson.embeddedContent.problems.length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
                  {t.embeddedProblems}
                </div>
                <ol style={{ fontSize: 13, lineHeight: 1.55, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 8 }}>
                  {lesson.embeddedContent.problems.map((p, i) => (
                    <li key={i}>
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                        <span style={{ flex: 1 }}>{p.problem}</span>
                        {p.difficulty && <span style={{ fontSize: 10, color: "var(--text-tertiary)", whiteSpace: "nowrap", marginTop: 2 }}>[{p.difficulty}]</span>}
                      </div>
                      <div style={{ fontSize: 12, color: "var(--success-text)", marginTop: 2 }}>✓ {p.answer}</div>
                    </li>
                  ))}
                </ol>
              </div>
            )}

            {lesson.embeddedContent.texts && lesson.embeddedContent.texts.length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
                  {t.embeddedTexts}
                </div>
                {lesson.embeddedContent.texts.map((tx, i) => (
                  <div key={i} style={{ background: "var(--bg-secondary)", border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-md)", padding: "12px 14px", marginBottom: 8 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>{tx.title}</div>
                    <p style={{ fontSize: 13, lineHeight: 1.6, marginBottom: 6, whiteSpace: "pre-wrap" }}>{tx.content}</p>
                    {tx.purpose && <div style={{ fontSize: 11, color: "var(--text-tertiary)", fontStyle: "italic" }}>↳ {tx.purpose}</div>}
                  </div>
                ))}
              </div>
            )}

            {lesson.embeddedContent.exampleAnswers && lesson.embeddedContent.exampleAnswers.length > 0 && (
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
                  {t.embeddedExamples}
                </div>
                <ul style={{ fontSize: 13, lineHeight: 1.55, listStyle: "none", display: "flex", flexDirection: "column", gap: 8 }}>
                  {lesson.embeddedContent.exampleAnswers.map((ex, i) => (
                    <li key={i} style={{ borderLeft: "2px solid var(--border-default)", paddingLeft: 10 }}>
                      <div style={{ fontSize: 12, color: "var(--text-secondary)", fontStyle: "italic", marginBottom: 2 }}>{ex.scenario}</div>
                      <div>→ "{ex.response}"</div>
                    </li>
                  ))}
                </ul>
              </div>
            )}
          </Section>
        )}

        {/* Exit ticket / exit exercise */}
        {(lesson.exitTicket || lesson.exitExercise) && (
          <div style={{ background: "#F0F7F2", border: "1px solid #C5DCC9", borderLeft: "3px solid var(--success-text)", borderRadius: "var(--radius-md)", padding: "12px 14px" }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--success-text)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
              ✦ {lesson.exitTicket ? t.exitTicket : t.exitExerciseTitle}
            </div>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>
              {(lesson.exitTicket || lesson.exitExercise).title}
            </div>
            <p style={{ fontSize: 13, lineHeight: 1.55 }}>
              {lesson.exitTicket ? lesson.exitTicket.task : lesson.exitExercise.description}
            </p>
            {lesson.exitTicket && lesson.exitTicket.purpose && (
              <p style={{ fontSize: 11, color: "var(--success-text)", fontStyle: "italic", marginTop: 4 }}>↳ {lesson.exitTicket.purpose}</p>
            )}
          </div>
        )}

        {/* Differentiation */}
        {lesson.differentiation && typeof lesson.differentiation === "object" && (lesson.differentiation.stod || lesson.differentiation.utmaning) && (
          <Section icon="users" label={t.differentiationTitle}>
            <div style={{ display: "grid", gridTemplateColumns: compact ? "1fr" : "1fr 1fr", gap: 12 }}>
              {lesson.differentiation.stod && (
                <div style={{ background: "#F4F8FC", border: "1px solid #D0DEEC", borderRadius: "var(--radius-md)", padding: "10px 12px" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", marginBottom: 5 }}>
                    🤝 {t.differentiationStod}
                  </div>
                  <ul style={{ fontSize: 13, lineHeight: 1.55, listStyle: "none", display: "flex", flexDirection: "column", gap: 4 }}>
                    {lesson.differentiation.stod.map((s, i) => <li key={i}>· {asLine(s)}</li>)}
                  </ul>
                </div>
              )}
              {lesson.differentiation.utmaning && (
                <div style={{ background: "#FAF6FC", border: "1px solid #DBC9E5", borderRadius: "var(--radius-md)", padding: "10px 12px" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#6B3E8E", marginBottom: 5 }}>
                    ⚡ {t.differentiationUtmaning}
                  </div>
                  <ul style={{ fontSize: 13, lineHeight: 1.55, listStyle: "none", display: "flex", flexDirection: "column", gap: 4 }}>
                    {lesson.differentiation.utmaning.map((s, i) => <li key={i}>· {asLine(s)}</li>)}
                  </ul>
                </div>
              )}
            </div>
          </Section>
        )}

        {/* Extra activities */}
        {lesson.extraActivities && lesson.extraActivities.length > 0 && (
          <Section icon="plus" label={t.extraActivitiesTitle}>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {lesson.extraActivities.map((act, i) => (
                <div key={i} style={{ borderLeft: "2px solid var(--border-default)", paddingLeft: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>{act.title}</div>
                  <p style={{ fontSize: 13, lineHeight: 1.55, color: "var(--text-secondary)" }}>{act.description}</p>
                  {act.answer && <p style={{ fontSize: 12, color: "var(--success-text)", marginTop: 2 }}>✓ {act.answer}</p>}
                </div>
              ))}
            </div>
          </Section>
        )}

        {/* Extra time tiers */}
        {lesson.extraTime && lesson.extraTime.length > 0 && (
          <details style={{ background: "var(--bg-secondary)", border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-md)", padding: "10px 14px" }}>
            <summary style={{ display: "flex", alignItems: "center", justifyContent: "space-between", cursor: "pointer", listStyle: "none" }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>+ {t.extraTimeTitle}</div>
                <div style={{ fontSize: 11, color: "var(--text-tertiary)" }}>{t.extraTimeDesc}</div>
              </div>
              <Icon name="chevronRight" size={14} style={{ color: "var(--text-tertiary)" }} />
            </summary>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 8, marginTop: 12 }}>
              {[...lesson.extraTime].sort((a, b) => a.minutes - b.minutes).map((tier, i) => (
                <div key={i} style={{ background: "var(--bg-surface)", border: "1px solid var(--border-default)", borderRadius: "var(--radius-md)", padding: "10px 12px" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", marginBottom: 4 }}>+{tier.minutes} min</div>
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>{tier.title}</div>
                  <p style={{ fontSize: 12, lineHeight: 1.5, marginBottom: 6 }}>{tier.description}</p>
                  <p style={{ fontSize: 11, color: "var(--text-tertiary)", fontStyle: "italic", lineHeight: 1.4 }}>↳ {tier.linkBack}</p>
                </div>
              ))}
            </div>
          </details>
        )}

        {/* Common pitfalls */}
        {lesson.commonPitfalls && lesson.commonPitfalls.length > 0 && (
          <Section icon="alert" label={t.commonPitfalls}>
            <ul style={{ fontSize: 13, lineHeight: 1.6, listStyle: "none", display: "flex", flexDirection: "column", gap: 5 }}>
              {lesson.commonPitfalls.map((p, i) => <li key={i} style={{ display: "flex", gap: 6 }}><span style={{ color: "var(--warning-text)" }}>⚠</span><span>{asLine(p)}</span></li>)}
            </ul>
          </Section>
        )}

        {/* Classroom management */}
        {lesson.classroomManagement && lesson.classroomManagement.length > 0 && (
          <Section icon="users" label={t.classroomManagement}>
            <ul style={{ fontSize: 13, lineHeight: 1.6, listStyle: "none", display: "flex", flexDirection: "column", gap: 5 }}>
              {lesson.classroomManagement.map((p, i) => <li key={i} style={{ display: "flex", gap: 6 }}><span style={{ color: "var(--text-tertiary)" }}>·</span><span>{asLine(p)}</span></li>)}
            </ul>
          </Section>
        )}

        {/* Teacher / vikarie notes */}
        {(lesson.teacherNotes || lesson.vikarieNotes) && (lesson.teacherNotes || lesson.vikarieNotes).length > 0 && (
          <div style={{ background: "var(--warning-bg)", border: "1px solid var(--warning-border)", borderRadius: "var(--radius-md)", padding: "12px 14px" }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--warning-text)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
              💡 {lesson.isSub ? t.vikarieNotesTitle : t.teacherNotes}
            </div>
            <ul style={{ fontSize: 13, lineHeight: 1.55, color: "var(--warning-text)", listStyle: "none", display: "flex", flexDirection: "column", gap: 4 }}>
              {(lesson.teacherNotes || lesson.vikarieNotes).map((n, i) => <li key={i} style={{ display: "flex", gap: 6 }}><span>·</span><span>{asLine(n)}</span></li>)}
            </ul>
          </div>
        )}

        {/* Homework */}
        {lesson.homework && lesson.homework !== "Ingen läxa" && lesson.homework !== "No homework" && (
          <Section icon="file" label={t.homework}>
            <p style={{ fontSize: 13, lineHeight: 1.6 }}>{lesson.homework}</p>
          </Section>
        )}

        {/* Assessment */}
        {lesson.assessment && (
          <Section icon="check" label={t.assessment}>
            <p style={{ fontSize: 13, lineHeight: 1.6 }}>{lesson.assessment}</p>
          </Section>
        )}

        {/* Sub tip */}
        {lesson.subTip && (
          <div style={{ background: "var(--warning-bg)", border: "2px solid var(--warning-border)", borderRadius: "var(--radius-md)", padding: "12px 14px" }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--warning-text)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>
              ⭐ {t.subTip}
            </div>
            <p style={{ fontSize: 13, color: "var(--warning-text)", lineHeight: 1.5, fontWeight: 500 }}>{lesson.subTip}</p>
          </div>
        )}
      </div>

      {/* Phase 1: Mark-as-used + Sub feedback — only on the accepted (non-option) lesson */}
      {!isOption && (onMarkUsed || onSubmitFeedback) && (
        <div className="no-print" style={{ marginTop: 18, paddingTop: 14, borderTop: "1px solid var(--border-subtle)", display: "flex", flexDirection: "column", gap: 12 }}>
          {onMarkUsed && (
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              {markedUsedFlash && (
                <span style={{ fontSize: 12, color: "var(--success-text, #1f7a4d)", fontWeight: 500 }}>
                  ✓ {t.markedUsed}
                </span>
              )}
              <Button variant="secondary" icon={<Icon name="check" size={14} />} onClick={handleMarkUsed} disabled={marking}>
                {t.markUsed}
              </Button>
            </div>
          )}

          {onSubmitFeedback && (
            <div style={{ border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-md)", overflow: "hidden" }}>
              <button onClick={() => setFeedbackOpen(o => !o)} style={{
                width: "100%", textAlign: "left", padding: "10px 14px",
                background: "var(--bg-secondary)", border: "none",
                cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
                fontSize: 13, fontWeight: 600, color: "var(--text-primary)",
              }}>
                <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  💬 {t.feedbackTitle}
                  {existingFeedback.length > 0 && (
                    <span style={{ fontSize: 11, fontWeight: 500, color: "var(--text-tertiary)", background: "var(--bg-surface)", padding: "1px 7px", borderRadius: 10 }}>
                      {existingFeedback.length}
                    </span>
                  )}
                </span>
                <span style={{ fontSize: 11, fontWeight: 500, color: "var(--text-tertiary)" }}>
                  {feedbackOpen ? t.feedbackHide : t.feedbackShow} {feedbackOpen ? "▴" : "▾"}
                </span>
              </button>

              {feedbackOpen && (
                <div style={{ padding: "12px 14px", display: "flex", flexDirection: "column", gap: 10 }}>
                  {existingFeedback.length === 0 ? (
                    <div style={{ fontSize: 12, color: "var(--text-tertiary)", fontStyle: "italic" }}>{t.feedbackEmpty}</div>
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {existingFeedback.map((f, i) => (
                        <div key={i} style={{ background: "var(--bg-secondary)", borderRadius: "var(--radius-sm)", padding: "8px 10px" }}>
                          <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginBottom: 4, display: "flex", justifyContent: "space-between", gap: 8 }}>
                            <span style={{ fontWeight: 600 }}>{f.subName || t.substituteName}</span>
                            <span>{f.at ? new Date(f.at).toLocaleString() : ""}</span>
                          </div>
                          <div style={{ fontSize: 13, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{f.text}</div>
                        </div>
                      ))}
                    </div>
                  )}

                  <div style={{ display: "grid", gap: 8 }}>
                    <Input value={fbSubName} onChange={(e) => setFbSubName(e.target.value)} placeholder={t.substituteName} />
                    <textarea value={fbText} onChange={(e) => setFbText(e.target.value)}
                      placeholder={t.feedbackPlaceholder} rows={3}
                      style={{
                        width: "100%", padding: "8px 10px", fontSize: 13, lineHeight: 1.5,
                        border: "1px solid var(--border-default)", borderRadius: "var(--radius-sm)",
                        background: "var(--bg-surface)", color: "var(--text-primary)",
                        fontFamily: "inherit", resize: "vertical",
                      }} />
                    <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 10 }}>
                      {fbState.sent && (
                        <span style={{ fontSize: 12, color: "var(--success-text, #1f7a4d)", fontWeight: 500 }}>
                          ✓ {t.feedbackSent}{fbState.synced === false ? ` (${t.syncFailedLocal})` : ""}
                        </span>
                      )}
                      <Button variant="primary" onClick={handleSendFeedback} disabled={fbState.sending || !fbText.trim()}>
                        {fbState.sending ? t.feedbackSending : t.feedbackSubmit}
                      </Button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {isOption && (
        <div style={{ marginTop: 16, paddingTop: 14, borderTop: "1px solid var(--border-subtle)", display: "flex", justifyContent: "flex-end" }}>
          <Button variant="primary" icon={<Icon name="check" size={14} />} onClick={onPick}>{t.chooseAccept}</Button>
        </div>
      )}
    </div>
  );
}

function Section({ icon, label, children }) {
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
        <Icon name={icon} size={13} style={{ color: "var(--text-tertiary)" }} />
        <span style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</span>
      </div>
      {children}
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
const STORAGE_KEY = "lektionsplaneraren-v1";

function App() {
  const [config, setConfig] = useState({
    provider: "gemini",
    geminiKey: "",
    geminiModel: "gemini-2.5-flash",
    anthropicKey: "",
    anthropicModel: "claude-sonnet-4-5-20250929",
    openaiKey: "",
    openaiModel: "gpt-5.5",
    grokKey: "",
    grokModel: "grok-4",
    localUrl: "http://localhost:1234",
    localKey: "",
    localModel: "local-model",
    language: "sv",
    appsScriptUrl: "",
    schoolId: "school-1",
  });
  const [showSettings, setShowSettings] = useState(false);
  const [showBank, setShowBank] = useState(false);
  const [showSchoolPicker, setShowSchoolPicker] = useState(false);
  const [bankLoading, setBankLoading] = useState(false);
  const [bankError, setBankError] = useState("");
  const [showPoolFull, setShowPoolFull] = useState(false);
  const [stage, setStage] = useState("");
  const [grade, setGrade] = useState("");
  const [subject, setSubject] = useState("");
  const [topic, setTopic] = useState("");
  const [duration, setDuration] = useState(60);
  // Phase 1: lesson-context fields (top-of-plan metadata)
  const [ctxTeacher, setCtxTeacher] = useState("");
  const [ctxClass, setCtxClass] = useState("");
  const [ctxDay, setCtxDay] = useState("");
  const [ctxTime, setCtxTime] = useState("");
  const [ctxRoom, setCtxRoom] = useState("");
  const [detailLevel, setDetailLevel] = useState("standard"); // 'quick' | 'standard' | 'full'
  const [extrasEnabled, setExtrasEnabled] = useState({
    worksheet: true,    // smart default ON
    anchorChart: true,  // smart default ON
    badges: false,
    flashcards: false,
    discussionCards: false,
    diagram: false,
    imageSearch: false,
  });
  // Cache of generated extras per lesson id; key = `${lessonId}:${kind}`
  const [extrasCache, setExtrasCache] = useState({});
  const [loadingExtras, setLoadingExtras] = useState({}); // { 'lessonId:kind': true }
  const [activeTab, setActiveTab] = useState({}); // { lessonId: 'plan' | 'worksheet' | ... }
  const [pending, setPending] = useState(null);
  const [acceptedLesson, setAcceptedLesson] = useState(null);
  const [subLesson, setSubLesson] = useState(null);
  const [loadingChoices, setLoadingChoices] = useState(false);
  const [loadingSub, setLoadingSub] = useState(false);
  const [topicSuggestions, setTopicSuggestions] = useState([]);
  const [loadingTopics, setLoadingTopics] = useState(false);
  const [error, setError] = useState("");

  const t = LANG[config.language] || LANG.sv;

  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      if (saved && typeof saved === "object") setConfig((c) => ({ ...c, ...saved }));
    } catch {}
  }, []);

  const saveConfig = (next) => {
    setConfig(next);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch {}
  };

  // Phase 3: refresh the bank from Apps Script on mount + whenever URL changes.
  const refreshBank = async () => {
    const url = config.appsScriptUrl || DEFAULT_APPS_SCRIPT_URL;
    if (!url) return;
    setBankLoading(true); setBankError("");
    try {
      await bankAPI.refresh(url);
    } catch (e) {
      console.error("Bank refresh failed", e);
      setBankError(String(e.message || e));
    } finally {
      setBankLoading(false);
    }
  };
  useEffect(() => {
    refreshBank();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [config.appsScriptUrl]);

  // Phase 4: refresh school list on load + force-show picker if no school yet.
  const refreshSchools = async () => {
    const url = config.appsScriptUrl || DEFAULT_APPS_SCRIPT_URL;
    if (!url) return;
    try { await schoolsAPI.refresh(url); } catch (e) { console.error("Schools refresh failed", e); }
  };
  useEffect(() => {
    (async () => {
      await refreshSchools();
      // If schoolId is missing or is a legacy default ("school-1"), force the picker.
      const known = schoolsAPI.all().some(s => s.school_id === config.schoolId);
      if (!known) setShowSchoolPicker(true);
    })();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [config.appsScriptUrl]);

  const handleSelectSchool = (school) => {
    saveConfig({ ...config, schoolId: school.school_id, schoolName: school.name });
    setShowSchoolPicker(false);
  };
  const handleCreateSchool = async (name) => {
    const url = config.appsScriptUrl || DEFAULT_APPS_SCRIPT_URL;
    return await schoolsAPI.create(url, name);
  };

  useEffect(() => { setGrade(""); setSubject(""); setTopicSuggestions([]); }, [stage]);
  useEffect(() => { setTopicSuggestions([]); }, [grade, subject]);
  // Clear suggestions when language toggles — stale chips in the wrong language look broken.
  useEffect(() => { setTopicSuggestions([]); }, [config.language]);

  // Phase 4: When the language toggles, translate the current lesson (no regenerate).
  // We use a ref to avoid stale-closure issues across renders.
  const translateRef = useRef(null);
  const firstLangRender = useRef(true);
  useEffect(() => {
    if (firstLangRender.current) {
      firstLangRender.current = false;
      return;
    }
    // Clear extras cache + loading flags + active tab — they're tied to the previous-language lesson id.
    setExtrasCache({});
    setLoadingExtras({});
    setActiveTab({});
    // Translate the currently accepted lesson into the new language (or revert to SV).
    if (acceptedLesson && translateRef.current) {
      translateRef.current(acceptedLesson.id, config.language);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [config.language]);

  const hasKey = useMemo(() => {
    if (config.provider === "gemini") return !!config.geminiKey;
    if (config.provider === "anthropic") return !!config.anthropicKey;
    if (config.provider === "openai") return !!config.openaiKey;
    if (config.provider === "grok") return !!config.grokKey;
    if (config.provider === "local") return !!config.localUrl;
    return false;
  }, [config]);

  const grades = stage ? STAGES[stage] : [];
  const subjects = stage ? SUBJECTS_BY_STAGE[stage] : [];
  const canGenerate = stage && grade && subject && topic.trim() && hasKey;

  const canSuggestTopics = stage && grade && subject && hasKey;

  const suggestTopics = async (append = false) => {
    if (!canSuggestTopics) return;
    setError(""); setLoadingTopics(true);
    try {
      const result = await runLLM(config,
        topicSuggestionsPrompt({
          stage, grade, subject, language: config.language,
          exclude: append ? topicSuggestions : [],
        })
      );
      const next = Array.isArray(result?.topics) ? result.topics : [];
      setTopicSuggestions(append ? [...topicSuggestions, ...next] : next);
    } catch (e) {
      setError(`${t.error}: ${e.message}`);
    } finally {
      setLoadingTopics(false);
    }
  };

  // Phase 3: Saves into the shared remote bank. Server enforces ACTIVE_POOL_LIMIT.
  // Phase 4: Always generate in Swedish (source of truth). UI translates on demand.
  const generateLesson = async () => {
    if (!canGenerate) return;
    const activePool = bankAPI.getActivePool({ stage, grade, subject });
    if (activePool.length >= ACTIVE_POOL_LIMIT) {
      setShowPoolFull(true);
      return;
    }
    setError(""); setLoadingChoices(true); setPending(null); setAcceptedLesson(null); setSubLesson(null);
    try {
      const result = await runLLM(config,
        lessonPrompt({ stage, grade, subject, topic, duration, branchIndex: 0, totalBranches: 1, language: "sv", detailLevel })
      );
      // Attach translations container with sv as the source.
      result.translations = { sv: result };
      const url = config.appsScriptUrl || DEFAULT_APPS_SCRIPT_URL;
      let record;
      try {
        record = await bankAPI.addLesson(url, {
          schoolId: config.schoolId || "school-1",
          stage, grade, subject, topic, title: result.title || topic,
          duration, lesson: result,
        });
      } catch (e) {
        if (e.code === "pool_full") {
          await refreshBank();
          setShowPoolFull(true);
          return;
        }
        throw e;
      }
      const ctx = { teacher: ctxTeacher, className: ctxClass, day: ctxDay, time: ctxTime, room: ctxRoom };
      // The view we hand to the renderer is in the CURRENT UI language. If UI is EN,
      // we kick off translation; until it lands, show Swedish.
      const accepted = { ...result, id: record.lesson_id, isSub: false, ctx };
      setAcceptedLesson(accepted);
      setActiveTab(tabs => ({ ...tabs, [accepted.id]: "plan" }));
      if (config.language !== "sv") {
        translateAndApplyLesson(record.lesson_id, config.language);
      }
    } catch (e) {
      setError(`${t.error}: ${e.message}`);
      console.error(e);
    } finally {
      setLoadingChoices(false);
    }
  };
  // Keep translateRef pointing at the latest translate function so the language-change
  // effect doesn't capture a stale closure.
  translateRef.current = (id, lang) => translateAndApplyLesson(id, lang);

  // Generate one extra. Safe to call multiple times — caches by (lessonId, kind).
  const generateExtra = async (lesson, kind) => {
    if (!lesson || !hasKey) return;
    const cacheKey = `${lesson.id}:${kind}`;
    if (extrasCache[cacheKey]) return; // already generated
    if (loadingExtras[cacheKey]) return; // already in flight
    setLoadingExtras(s => ({ ...s, [cacheKey]: true }));
    try {
      const result = await runLLM(config,
        extrasPrompt({ kind, lesson, stage, grade, subject, topic, duration, language: config.language })
      );
      setExtrasCache(c => ({ ...c, [cacheKey]: result }));
    } catch (e) {
      setExtrasCache(c => ({ ...c, [cacheKey]: { _error: e.message } }));
    } finally {
      setLoadingExtras(s => { const next = { ...s }; delete next[cacheKey]; return next; });
    }
  };

  // Open a saved lesson from the bank by its remote id.
  const loadLessonFromBank = (id) => {
    const rec = bankAPI.byId(id);
    if (!rec) return;
    setStage(rec.stage); setGrade(String(rec.grade)); setSubject(rec.subject);
    setTopic(rec.topic || ""); if (rec.duration) setDuration(Number(rec.duration));
    // Pick view in current UI language if available; otherwise SV source.
    const view = (rec.lesson?.translations?.[config.language]) || rec.lesson?.translations?.sv || rec.lesson;
    setAcceptedLesson({
      ...view, id: rec.lesson_id, isSub: !!rec.lesson?.isSub,
      ctx: { teacher: ctxTeacher, className: ctxClass, day: ctxDay, time: ctxTime, room: ctxRoom },
    });
    setPending(null); setSubLesson(null);
    setShowPoolFull(false); setShowBank(false);
    // If UI is non-SV and translation missing, translate now.
    if (config.language !== "sv" && !rec.lesson?.translations?.[config.language]) {
      translateAndApplyLesson(id, config.language);
    }
  };

  // Mark current accepted lesson as "used" — auto-archives in the bank (frees a slot
  // for ALL schools — pool is shared) AND logs usage locally (per school).
  const markLessonUsed = async () => {
    if (!acceptedLesson?.id) return { ok: false, reason: "no-id" };
    const rec = bankAPI.byId(acceptedLesson.id);
    const used = {
      teacher: acceptedLesson.ctx?.teacher || ctxTeacher,
      className: acceptedLesson.ctx?.className || ctxClass,
      day: acceptedLesson.ctx?.day || ctxDay,
      time: acceptedLesson.ctx?.time || ctxTime,
      room: acceptedLesson.ctx?.room || ctxRoom,
    };
    // Local: always log usage.
    lessonLibrary.addUsage({ lessonId: acceptedLesson.id, used });
    // Remote: log to Sheet + archive in bank.
    const url = config.appsScriptUrl || DEFAULT_APPS_SCRIPT_URL;
    if (url) {
      try {
        await postToAppsScript(url, {
          type: "usage",
          schoolId: config.schoolId || "school-1",
          lessonId: acceptedLesson.id,
          title: acceptedLesson.title,
          stage: rec?.stage, grade: rec?.grade, subject: rec?.subject, topic: rec?.topic,
          ...used,
        });
        await bankAPI.archive(url, acceptedLesson.id, config.schoolId || "school-1");
        return { ok: true, synced: true };
      } catch (e) {
        console.error("Apps Script sync failed", e);
        return { ok: true, synced: false };
      }
    }
    return { ok: true, synced: false };
  };

  // Submit substitute feedback for the current accepted lesson (local + remote log).
  const submitLessonFeedback = async ({ subName, text }) => {
    if (!acceptedLesson?.id) return { ok: false };
    const rec = bankAPI.byId(acceptedLesson.id);
    const feedback = { subName, text };
    lessonLibrary.addFeedback({ lessonId: acceptedLesson.id, feedback });
    const url = config.appsScriptUrl || DEFAULT_APPS_SCRIPT_URL;
    if (url) {
      try {
        await postToAppsScript(url, {
          type: "feedback",
          schoolId: config.schoolId || "school-1",
          lessonId: acceptedLesson.id,
          title: acceptedLesson.title,
          stage: rec?.stage, grade: rec?.grade, subject: rec?.subject, topic: rec?.topic,
          ...feedback,
        });
        return { ok: true, synced: true };
      } catch (e) {
        console.error("Apps Script sync failed", e);
        return { ok: true, synced: false };
      }
    }
    return { ok: true, synced: false };
  };

  // Manual archive (e.g. teacher decides this lesson is no good) — bank-wide.
  const archiveLessonInBank = async (id) => {
    const url = config.appsScriptUrl || DEFAULT_APPS_SCRIPT_URL;
    try {
      await bankAPI.archive(url, id, config.schoolId || "school-1");
    } catch (e) {
      console.error("Archive failed", e);
    }
    if (acceptedLesson?.id === id) setAcceptedLesson(null);
  };

  // Wrapper for the PoolFullModal "Open" button.
  const openPoolLesson = (id) => loadLessonFromBank(id);

  // Phase 4: translate a lesson into target language and apply to the currently
  // displayed acceptedLesson. Caches on the bank record so subsequent toggles
  // are instant. The bank record's translation is persisted remotely best-effort.
  const [translating, setTranslating] = useState(false);
  const translateAndApplyLesson = async (lessonId, targetLang) => {
    if (!lessonId || targetLang === "sv") return;
    const rec = bankAPI.byId(lessonId);
    if (!rec) return;
    const sourceLesson = rec.lesson?.translations?.sv || rec.lesson;
    const existing = rec.lesson?.translations?.[targetLang];
    if (existing) {
      // Already cached — apply immediately.
      setAcceptedLesson(prev => prev && prev.id === lessonId
        ? { ...existing, id: lessonId, isSub: prev.isSub, ctx: prev.ctx }
        : prev);
      return;
    }
    setTranslating(true);
    try {
      const result = await runLLM(config, translateLessonPrompt({ lesson: sourceLesson, targetLanguage: targetLang }));
      // Cache locally
      const cache = loadBankCache();
      const cached = cache.lessons.find(l => l.lesson_id === lessonId);
      if (cached) {
        cached.lesson = cached.lesson || {};
        cached.lesson.translations = cached.lesson.translations || { sv: sourceLesson };
        cached.lesson.translations[targetLang] = result;
        saveBankCache(cache);
      }
      // Apply to current view
      setAcceptedLesson(prev => prev && prev.id === lessonId
        ? { ...result, id: lessonId, isSub: prev.isSub, ctx: prev.ctx }
        : prev);
      // Best-effort: persist translation to bank (so other schools benefit).
      // We re-POST as a translation update — Apps Script will need a tiny handler.
      // For now we skip remote persistence; translations live in local cache.
    } catch (e) {
      console.error("Translate failed", e);
      setError(`${t.error}: ${e.message}`);
    } finally {
      setTranslating(false);
    }
  };


  // Generate a substitute lesson. If acceptedLesson exists, builds on top of it
  // (attached follow-up under the main lesson). If not, generates a standalone
  // substitute lesson and shows it as the main accepted lesson. The standalone
  // path is what a coordinator uses when there's no saved plan yet.
  const generateSub = async ({ standalone = false } = {}) => {
    if (!hasKey) return;
    if (!standalone && !acceptedLesson) return;
    if (standalone && !canGenerate) return;
    if (standalone) {
      const activePool = bankAPI.getActivePool({ stage, grade, subject });
      if (activePool.length >= ACTIVE_POOL_LIMIT) {
        setShowPoolFull(true);
        return;
      }
    }
    setError("");
    setLoadingSub(true);
    if (standalone) { setLoadingChoices(true); setAcceptedLesson(null); setSubLesson(null); }
    try {
      const result = await runLLM(config,
        subPrompt({
          stage, grade, subject, topic, duration,
          baseLesson: standalone ? null : acceptedLesson,
          language: "sv",
        })
      );
      if (standalone) {
        result.translations = { sv: result };
        const url = config.appsScriptUrl || DEFAULT_APPS_SCRIPT_URL;
        let record;
        try {
          record = await bankAPI.addLesson(url, {
            schoolId: config.schoolId || "school-1",
            stage, grade, subject, topic, title: result.title || topic,
            duration, lesson: { ...result, isSub: true },
          });
        } catch (e) {
          if (e.code === "pool_full") {
            await refreshBank();
            setShowPoolFull(true);
            return;
          }
          throw e;
        }
        const ctx = { teacher: ctxTeacher, className: ctxClass, day: ctxDay, time: ctxTime, room: ctxRoom };
        const accepted = { ...result, id: record.lesson_id, isSub: true, ctx };
        setAcceptedLesson(accepted);
        setActiveTab(tabs => ({ ...tabs, [accepted.id]: "plan" }));
        if (config.language !== "sv") {
          translateAndApplyLesson(record.lesson_id, config.language);
        }
      } else {
        setSubLesson({ ...result, id: `sub-${Date.now()}`, isSub: true });
      }
    } catch (e) {
      setError(`${t.error}: ${e.message}`);
    } finally {
      setLoadingSub(false);
      if (standalone) setLoadingChoices(false);
    }
  };

  const reset = () => {
    setPending(null);
    setAcceptedLesson(null);
    setSubLesson(null);
    setError("");
  };

  const exportMd = () => {
    const lessons = [acceptedLesson, subLesson].filter(Boolean);
    const lines = [
      `# ${t.mdTitle}`, ``,
      `**${t.mdStage}:** ${stage}  `,
      `**${t.mdGrade}:** ${grade}  `,
      `**${t.mdSubject}:** ${subject}  `,
      `**${t.mdTopic}:** ${topic}  `,
      `**${t.mdDuration}:** ${duration} min  `,
      ``, `---`, ``,
    ];
    lessons.forEach((l) => {
      lines.push(`## ${l.title}${l.isSub ? ` 🟡 (${t.mdSubTag})` : ""}`);
      lines.push(`*${l.approach}*`, ``);
      if (l.summary) lines.push(`${l.summary}`, ``);
      if (l.learningGoal || l.objective) lines.push(`**${t.mdLearningGoal}:** ${l.learningGoal || l.objective}`);
      if (l.lgr22_connection) lines.push(`**${t.mdCurriculumLink}:** ${l.lgr22_connection}`);
      lines.push(``);

      if (l.materialsNeeded || l.materials) {
        lines.push(`### ${t.materials}`);
        (l.materialsNeeded || l.materials || []).forEach((m) => lines.push(`- ${asLine(m)}`));
        lines.push(``);
      }

      if (l.phases && l.phases.length) {
        lines.push(`### ${t.phases}`);
        l.phases.forEach((p, i) => {
          lines.push(`#### ${i + 1}. ${p.name} (${p.minutes} min)`);
          if (p.teacherDoes && p.teacherDoes.length) {
            lines.push(`**${t.teacherDoes}:**`);
            p.teacherDoes.forEach((s) => lines.push(`- ${asLine(s)}`));
          }
          if (p.studentsDo && p.studentsDo.length) {
            lines.push(`**${t.studentsDo}:**`);
            p.studentsDo.forEach((s) => lines.push(`- ${asLine(s)}`));
          }
          lines.push(``);
        });
      } else if (l.activities) {
        lines.push(`### ${t.activities}`);
        l.activities.forEach((a) => lines.push(`- ${asLine(a)}`));
        lines.push(``);
      }

      if (l.exitExercise) {
        lines.push(`### ${t.exitExerciseTitle} (${l.exitExercise.durationMinutes} min)`);
        lines.push(`**${l.exitExercise.title}**`);
        lines.push(l.exitExercise.description, ``);
      }

      if (l.differentiation && typeof l.differentiation === "object") {
        lines.push(`### ${t.differentiationTitle}`);
        if (l.differentiation.stod) {
          lines.push(`**${t.differentiationStod}:**`);
          l.differentiation.stod.forEach((s) => lines.push(`- ${asLine(s)}`));
        }
        if (l.differentiation.utmaning) {
          lines.push(`**${t.differentiationUtmaning}:**`);
          l.differentiation.utmaning.forEach((s) => lines.push(`- ${asLine(s)}`));
        }
        lines.push(``);
      } else if (typeof l.differentiation === "string") {
        lines.push(`**${t.differentiationTitle}:** ${l.differentiation}`, ``);
      }

      if (l.extraActivities && l.extraActivities.length) {
        lines.push(`### ${t.extraActivitiesTitle}`);
        l.extraActivities.forEach((a) => lines.push(`- **${a.title}** — ${a.description}`));
        lines.push(``);
      }

      if (l.extraTime && l.extraTime.length) {
        lines.push(`### ${t.extraTimeTitle}`);
        l.extraTime.sort((a,b) => a.minutes - b.minutes).forEach((tier) => {
          lines.push(`- **+${tier.minutes} min · ${tier.title}** — ${tier.description} (${tier.linkBack})`);
        });
        lines.push(``);
      }

      if (l.vikarieNotes && l.vikarieNotes.length) {
        lines.push(`### ${t.vikarieNotesTitle}`);
        l.vikarieNotes.forEach((n) => lines.push(`- ${asLine(n)}`));
        lines.push(``);
      }

      if (l.assessment) lines.push(`**${t.mdAssessment}:** ${l.assessment}`);
      if (l.subTip) lines.push(`**${t.mdSubTip}:** ${l.subTip}`);
      lines.push(``, `---`, ``);
    });
    const blob = new Blob([lines.join("\n")], { type: "text/markdown" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const filePrefix = config.language === "sv" ? "lektion" : "lesson";
    a.download = `${filePrefix}-${subject}-${grade}.md`.replace(/\s+/g, "-").replace(/\//g, "-");
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ minHeight: "100vh" }}>
      {showSettings && <SettingsModal config={config} onSave={saveConfig} onClose={() => setShowSettings(false)} t={t} onOpenSchoolPicker={() => setShowSchoolPicker(true)} />}
      {showSchoolPicker && (
        <SchoolPickerModal
          t={t}
          currentSchoolId={config.schoolId}
          requireSelection={!schoolsAPI.all().some(s => s.school_id === config.schoolId)}
          onClose={() => setShowSchoolPicker(false)}
          onSelect={handleSelectSchool}
          onCreate={handleCreateSchool}
        />
      )}
      {showBank && (
        <BankView
          t={t}
          loading={bankLoading}
          error={bankError}
          onClose={() => setShowBank(false)}
          onOpen={(id) => loadLessonFromBank(id)}
          onArchive={(id) => archiveLessonInBank(id)}
          onRefresh={refreshBank}
        />
      )}
      {showPoolFull && (
        <PoolFullModal
          stage={stage} grade={grade} subject={subject}
          t={t}
          onClose={() => setShowPoolFull(false)}
          onOpen={(id) => openPoolLesson(id)}
          onArchiveAndGenerate={async (id) => {
            const url = config.appsScriptUrl || DEFAULT_APPS_SCRIPT_URL;
            try { await bankAPI.archive(url, id, config.schoolId || "school-1"); } catch (e) { console.error(e); }
            setShowPoolFull(false);
            setTimeout(() => generateLesson(), 0);
          }}
        />
      )}

      <div style={{ maxWidth: 880, margin: "0 auto", padding: "32px 20px 80px" }}>
        {/* HEADER */}
        <header className="no-print" style={{ marginBottom: 24, display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 38, height: 38, background: "var(--accent)", borderRadius: "var(--radius-md)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff" }}>
              <Icon name="book" size={20} />
            </div>
            <div>
              <h1 style={{ fontSize: 22, fontWeight: 600, lineHeight: 1.2 }}>{t.title}</h1>
              <p style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 2 }}>{t.subtitle}</p>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <div style={{ fontSize: 12, color: "var(--text-tertiary)", display: "flex", alignItems: "center", gap: 6 }}>
              <Icon name="key" size={12} />
              <span>{providerDisplayName(config.provider, config.language)}</span>
              {!hasKey && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#E8C547" }} />}
              {hasKey && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--success-text)" }} />}
            </div>
            <LangToggle value={config.language} onChange={(lng) => saveConfig({ ...config, language: lng })} />
            {config.schoolName && (
              <button onClick={() => setShowSchoolPicker(true)}
                title={t.changeSchool}
                style={{
                  display: "inline-flex", alignItems: "center", gap: 5,
                  padding: "6px 10px", fontSize: 12, fontWeight: 500,
                  background: "var(--bg-secondary)", color: "var(--text-secondary)",
                  border: "1px solid var(--border-default)", borderRadius: "var(--radius-md)", cursor: "pointer",
                }}>
                🏫 {config.schoolName}
              </button>
            )}
            <Button variant="secondary" icon={<Icon name="settings" size={14} />} onClick={() => setShowSettings(true)}>
              {t.apiSettings}
            </Button>
            <Button variant="secondary" icon={<Icon name="book" size={14} />} onClick={() => setShowBank(true)} title={t.bankTitle}>
              {t.bankButton} <SavedCountInline />
            </Button>
          </div>
        </header>

        {/* API KEY WARNING */}
        {!hasKey && (
          <div className="no-print" style={{ background: "var(--warning-bg)", border: "1px solid var(--warning-border)", borderRadius: "var(--radius-md)", padding: "14px 18px", marginBottom: 20, display: "flex", alignItems: "flex-start", gap: 12 }}>
            <div style={{ color: "var(--warning-text)", flexShrink: 0, marginTop: 2 }}>
              <Icon name="alert" size={18} />
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "var(--warning-text)", marginBottom: 2 }}>{t.apiKeyMissing}</div>
              <div style={{ fontSize: 12, color: "var(--warning-text)" }}>{t.apiKeyMissingDesc}</div>
            </div>
            <Button variant="primary" onClick={() => setShowSettings(true)}>{t.openSettings}</Button>
          </div>
        )}

        {/* INPUT FORM */}
        <div className="no-print" style={{ background: "var(--bg-surface)", border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-lg)", padding: 24, marginBottom: 16 }}>
          <h2 style={{ fontSize: 14, fontWeight: 600, color: "var(--text-primary)", marginBottom: 16, display: "flex", alignItems: "center", gap: 6 }}>
            <Icon name="file" size={14} />
            {t.lessonDetails}
          </h2>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 14 }}>
            <Field label={t.stage}>
              <Select value={stage} onChange={(e) => setStage(e.target.value)}>
                <option value="">{t.chooseStage}</option>
                {Object.keys(STAGES).map((s) => <option key={s} value={s}>{localizeLabel(s, config.language)}</option>)}
              </Select>
            </Field>
            <Field label={t.grade}>
              <Select value={grade} onChange={(e) => setGrade(e.target.value)} disabled={!stage}>
                <option value="">{stage ? t.chooseGrade : t.chooseStageFirst}</option>
                {grades.map((g) => <option key={g} value={g}>{localizeLabel(g, config.language)}</option>)}
              </Select>
            </Field>
            <Field label={t.subject}>
              <Select value={subject} onChange={(e) => setSubject(e.target.value)} disabled={!stage}>
                <option value="">{stage ? t.chooseSubject : t.chooseStageFirst}</option>
                {subjects.map((s) => <option key={s} value={s}>{localizeLabel(s, config.language)}</option>)}
              </Select>
            </Field>
            <Field label={t.duration}>
              <Select value={duration} onChange={(e) => setDuration(Number(e.target.value))}>
                {[30, 40, 45, 60, 80, 90, 120].map((d) => <option key={d} value={d}>{d} min</option>)}
              </Select>
            </Field>
          </div>

          {/* Phase 1: lesson-context fields (teacher/class/day/time/room) */}
          <div style={{ marginTop: 18, paddingTop: 14, borderTop: "1px dashed var(--border-default)" }}>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8, flexWrap: "wrap", marginBottom: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em" }}>
                {t.contextHeader}
              </div>
              <div style={{ fontSize: 11, color: "var(--text-tertiary)", fontStyle: "italic" }}>{t.contextOptional}</div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10 }}>
              <Field label={t.teacher}><Input value={ctxTeacher} onChange={(e) => setCtxTeacher(e.target.value)} placeholder="—" /></Field>
              <Field label={t.className}><Input value={ctxClass} onChange={(e) => setCtxClass(e.target.value)} placeholder="—" /></Field>
              <Field label={t.day}><Input value={ctxDay} onChange={(e) => setCtxDay(e.target.value)} placeholder="—" type="date" /></Field>
              <Field label={t.time}><Input value={ctxTime} onChange={(e) => setCtxTime(e.target.value)} placeholder="—" /></Field>
              <Field label={t.room}><Input value={ctxRoom} onChange={(e) => setCtxRoom(e.target.value)} placeholder="—" /></Field>
            </div>
          </div>
          <div style={{ marginTop: 14 }}>
            <Field label={t.topic}>
              <Input value={topic} onChange={(e) => setTopic(e.target.value)} placeholder={t.topicPlaceholder} />
            </Field>

            {canSuggestTopics && (
              <div style={{ marginTop: 10 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, gap: 8, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em" }}>
                    {t.topicSuggestions}
                  </span>
                  {topicSuggestions.length === 0 ? (
                    <button onClick={() => suggestTopics(false)} disabled={loadingTopics} style={{
                      display: "inline-flex", alignItems: "center", gap: 5,
                      padding: "5px 10px", fontSize: 12, fontWeight: 500,
                      background: "transparent", color: "var(--accent)",
                      border: "1px solid var(--border-default)", borderRadius: "var(--radius-sm)",
                      cursor: loadingTopics ? "wait" : "pointer",
                    }}>
                      <Icon name={loadingTopics ? "refresh" : "sparkles"} size={12} style={loadingTopics ? { animation: "spin 0.8s linear infinite" } : {}} />
                      {loadingTopics ? t.suggestingTopics : t.suggestTopics}
                    </button>
                  ) : (
                    <button onClick={() => suggestTopics(true)} disabled={loadingTopics} style={{
                      display: "inline-flex", alignItems: "center", gap: 5,
                      padding: "5px 10px", fontSize: 12, fontWeight: 500,
                      background: "transparent", color: "var(--text-secondary)",
                      border: "1px solid var(--border-default)", borderRadius: "var(--radius-sm)",
                      cursor: loadingTopics ? "wait" : "pointer",
                    }}>
                      <Icon name={loadingTopics ? "refresh" : "plus"} size={12} style={loadingTopics ? { animation: "spin 0.8s linear infinite" } : {}} />
                      {loadingTopics ? t.suggestingTopics : t.moreSuggestions}
                    </button>
                  )}
                </div>

                {topicSuggestions.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {topicSuggestions.map((s, i) => {
                      const selected = topic === s;
                      return (
                        <button key={i} onClick={() => setTopic(s)} style={{
                          padding: "6px 12px", fontSize: 12, fontWeight: 500,
                          background: selected ? "var(--accent)" : "var(--bg-surface)",
                          color: selected ? "#fff" : "var(--text-primary)",
                          border: `1px solid ${selected ? "var(--accent)" : "var(--border-default)"}`,
                          borderRadius: 999,
                          cursor: "pointer", transition: "all 0.12s",
                        }}>{s}</button>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>

          <div style={{ marginTop: 18, paddingTop: 14, borderTop: "1px dashed var(--border-default)" }}>
            <DetailAndExtrasControls
              detailLevel={detailLevel}
              setDetailLevel={setDetailLevel}
              extrasEnabled={extrasEnabled}
              setExtrasEnabled={setExtrasEnabled}
              t={t}
            />
          </div>

          <div style={{ marginTop: 18, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            {/* Live pool counter for (stage|grade|subject) */}
            {stage && grade && subject ? (
              <PoolIndicator stage={stage} grade={grade} subject={subject} t={t} onOpen={() => setShowPoolFull(true)} />
            ) : <span />}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {acceptedLesson && (
                <Button variant="secondary" icon={<Icon name="refresh" size={14} />} onClick={reset}>{t.reset}</Button>
              )}
              <Button variant="yellow" icon={loadingSub ? <Icon name="refresh" size={14} style={{ animation: "spin 0.8s linear infinite" }} /> : <Icon name="coffee" size={14} />}
                onClick={() => generateSub({ standalone: true })} disabled={!canGenerate || loadingChoices || loadingSub}
                title={t.createStandaloneSubHint}>
                {loadingSub ? t.creating : t.createStandaloneSub}
              </Button>
              <Button variant="primary" icon={loadingChoices ? <Icon name="refresh" size={14} style={{ animation: "spin 0.8s linear infinite" }} /> : <Icon name="sparkles" size={14} />}
                onClick={generateLesson} disabled={!canGenerate || loadingChoices || loadingSub}>
                {loadingChoices ? t.generating : t.generateChoices}
              </Button>
            </div>
          </div>
        </div>

        {/* ERROR */}
        {error && (
          <div style={{ background: "var(--danger-bg)", border: "1px solid var(--danger-text)", borderRadius: "var(--radius-md)", padding: "12px 16px", marginBottom: 16, fontSize: 13, color: "var(--danger-text)", display: "flex", gap: 10 }}>
            <Icon name="alert" size={16} />
            <span>{error}</span>
          </div>
        )}

        {/* ACCEPTED LESSON */}
        {acceptedLesson && (
          <div style={{ marginBottom: 16 }}>
            <div className="no-print" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, gap: 8, flexWrap: "wrap" }}>
              <h2 style={{ fontSize: 16, fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}>
                {t.yourLesson}
                {translating && (
                  <span style={{ fontSize: 11, fontWeight: 500, color: "var(--text-tertiary)", display: "inline-flex", alignItems: "center", gap: 4 }}>
                    <Icon name="refresh" size={11} style={{ animation: "spin 0.8s linear infinite" }} />
                    {t.translating}
                  </span>
                )}
              </h2>
              <div style={{ display: "flex", gap: 8 }}>
                <Button variant="ghost" icon={<Icon name="refresh" size={13} />} onClick={generateLesson}>{t.addAnother}</Button>
                <Button variant="ghost" icon={<Icon name="print" size={13} />} onClick={() => window.print()}>{t.print}</Button>
                <Button variant="ghost" icon={<Icon name="download" size={13} />} onClick={exportMd}>{t.download}</Button>
              </div>
            </div>
            <LessonCardWithTabs
              lesson={acceptedLesson}
              t={t}
              extrasEnabled={extrasEnabled}
              extrasCache={extrasCache}
              loadingExtras={loadingExtras}
              onGenerateExtra={(kind) => generateExtra(acceptedLesson, kind)}
              onForceRegenerate={(kind) => {
                const cacheKey = `${acceptedLesson.id}:${kind}`;
                setExtrasCache(c => { const next = { ...c }; delete next[cacheKey]; return next; });
                generateExtra(acceptedLesson, kind);
              }}
              activeTab={activeTab[acceptedLesson.id] || "plan"}
              setActiveTab={(tab) => setActiveTab(s => ({ ...s, [acceptedLesson.id]: tab }))}
              onMarkUsed={markLessonUsed}
              onSubmitFeedback={submitLessonFeedback}
            />

            {!subLesson && (
              <div className="no-print" style={{ marginTop: 14, padding: 16, background: "var(--bg-secondary)", border: "1px dashed var(--border-default)", borderRadius: "var(--radius-md)", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 32, height: 32, background: "#FFF8E1", border: "1px solid #E8C547", borderRadius: "var(--radius-md)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--warning-text)" }}>
                    <Icon name="coffee" size={16} />
                  </div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{t.createSub}</div>
                    <div style={{ fontSize: 12, color: "var(--text-secondary)" }}>{t.subDesc}</div>
                  </div>
                </div>
                <Button variant="yellow" icon={loadingSub ? <Icon name="refresh" size={14} style={{ animation: "spin 0.8s linear infinite" }} /> : <Icon name="coffee" size={14} />} onClick={generateSub} disabled={loadingSub}>
                  {loadingSub ? t.creating : t.createSub}
                </Button>
              </div>
            )}
          </div>
        )}

        {/* SUB LESSON */}
        {subLesson && (
          <div style={{ marginBottom: 16 }}>
            <div className="no-print" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, gap: 8, flexWrap: "wrap" }}>
              <h2 style={{ fontSize: 16, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                <Icon name="coffee" size={16} />
                {t.substituteLesson}
              </h2>
              <Button variant="ghost" icon={<Icon name="refresh" size={13} />} onClick={generateSub} disabled={loadingSub}>
                {loadingSub ? t.creating : t.addAnother}
              </Button>
            </div>
            <LessonCard lesson={subLesson} t={t} />
          </div>
        )}

        <div className="no-print" style={{ marginTop: 40, fontSize: 11, color: "var(--text-tertiary)", textAlign: "center", lineHeight: 1.6 }}>
          {t.print_warning}
        </div>
      </div>

      <AppVersionBadgeMount providerLabel={providerDisplayName(config.provider, config.language)} onOpenLibrary={() => setShowBank(true)} />
    </div>
  );
}

function AppVersionBadgeMount({ providerLabel, onOpenLibrary }) {
  useBankVersion();
  const savedCount = bankAPI.active().length;
  return <VersionBadge providerLabel={providerLabel} savedCount={savedCount} onOpenLibrary={onOpenLibrary} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
